<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 360px;
      padding: 0 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #1e40af;
      margin-bottom: 14px;
      font-size: 20px;
    }

    .logo-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 11px;
      color: #475569;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 28px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 7px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .field input::placeholder { color: #334155; }

    .error-msg {
      font-size: 12px;
      color: #f87171;
      min-height: 16px;
      margin-bottom: 8px;
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:active { background: #1e3a8a; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #334155;
    }

    .footer a {
      color: #475569;
      text-decoration: none;
    }

    .footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <div class="logo-mark">⚙</div>
    <div class="logo-title">USB Assistant</div>
    <div class="logo-sub">Admin Console</div>
  </div>

  <div class="card">
    <div class="card-title">管理员登录</div>
    <div class="card-sub">仅限授权管理员访问</div>

    <form onsubmit="return false">
      <div class="field">
        <div class="field-label">Email</div>
        <input id="email" type="email" placeholder="admin@example.com" autocomplete="username" />
      </div>
      <div class="field">
        <div class="field-label">Password</div>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="error-msg" class="error-msg"></div>
      <button class="submit-btn" onclick="doLogin()">登录后台</button>
    </form>
  </div>

  <div class="footer">
    <a href="/index.html">← 返回前台</a>
  </div>
</div>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:8081' : '';

  // If already logged in as admin, go straight to admin
  fetch(`${API}/auth/admin-me`, { credentials: 'include' })
    .then(r => r.ok ? r.json() : null)
    .then(data => { if (data?.role === 'admin') window.location.replace('/admin.html'); })
    .catch(() => {});

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; return; }
    try {
      const res = await fetch(`${API}/auth/admin-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        errEl.textContent = d.detail === 'Admin only' ? '该账号没有管理员权限' : '邮箱或密码错误';
        return;
      }
      window.location.replace('/admin.html');
    } catch {
      errEl.textContent = '网络错误，请重试';
    }
  }
</script>
</body>
</html>
