<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商户助手 — 设置你的商家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #003178;
      --accent: #2563eb;
      --bg: #f0f4ff;
      --card: #ffffff;
      --surface-low: #f8faff;
      --border: #e2e8f0;
      --border-focus: #93c5fd;
      --text: #1a1d1e;
      --text-muted: #64748b;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,49,120,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(37,99,235,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,49,120,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      gap: 12px;
    }

    .logo-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 6px 20px rgba(0,49,120,0.25);
    }

    .logo-name {
      font-family: 'Manrope', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Progress bar ── */
    .progress-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .progress-step {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s ease;
    }

    .progress-step.active { background: var(--accent); }
    .progress-step.done { background: #22c55e; }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--card);
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-family: 'Manrope', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ── Step screens ── */
    .step { display: none; }
    .step.active { display: block; }

    /* ── Type selection ── */
    .type-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .type-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface-low);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
      width: 100%;
    }

    .type-btn:hover {
      border-color: var(--accent);
      background: #eff6ff;
    }

    .type-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: #eff6ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .type-label { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 2px; }
    .type-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

    /* ── Search ── */
    .search-box {
      position: relative;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: var(--surface-low);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-loading {
      text-align: center;
      padding: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .search-results {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface-low);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .result-item:hover {
      border-color: var(--accent);
      background: #eff6ff;
    }

    .result-photo {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg);
    }

    .result-photo-placeholder {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .result-info { flex: 1; min-width: 0; }
    .result-name { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 2px; }
    .result-meta { font-size: 12px; color: var(--text-muted); }
    .result-addr { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    .result-arrow { font-size: 16px; color: var(--text-muted); flex-shrink: 0; }

    .no-result {
      text-align: center;
      padding: 20px 16px;
      border-radius: 10px;
      background: var(--surface-low);
    }

    .no-result-text { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }

    .link-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }

    /* ── Confirm ── */
    .confirm-card {
      padding: 20px;
      border-radius: 12px;
      background: var(--surface-low);
      border: 1.5px solid var(--border);
      margin-bottom: 20px;
    }

    .confirm-photo {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .confirm-name {
      font-family: 'Manrope', sans-serif;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .confirm-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .confirm-badge {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .confirm-addrs {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── New brand ── */
    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: var(--surface-low);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 16px;
    }

    .field-input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }

    /* ── Generating ── */
    .gen-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .gen-text-preview {
      background: var(--surface-low);
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
      border: 1.5px solid var(--border);
    }

    .gen-done-icon {
      font-size: 32px;
      text-align: center;
      margin-bottom: 8px;
    }

    .gen-done-title {
      font-family: 'Manrope', sans-serif;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }

    .gen-done-sub {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 10px;
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      margin-bottom: 16px;
    }

    .back-btn:hover { color: var(--accent); }

    .error-msg {
      font-size: 12px;
      color: #ef4444;
      min-height: 16px;
      margin-top: 4px;
    }

    .skip-link {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .skip-link a {
      color: var(--text-muted);
      text-decoration: underline;
      cursor: pointer;
    }

    .skip-link a:hover { color: var(--accent); }
  </style>

  <!-- Brand canvas styles (injected into full-screen overlay) -->
  <style id="canvas-css">
  #brand-canvas { font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); }
  #brand-canvas * { box-sizing: border-box; }
  .bc-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .bc-card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  /* header */
  .bc-brand-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .bc-brand-ico { width:44px; height:44px; border-radius:12px; background:#eff6ff; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .bc-brand-name { font-size:18px; font-weight:700; color:var(--text); }
  .bc-brand-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .bc-scan-badge { margin-left:auto; background:#eff6ff; color:var(--accent); border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; white-space:nowrap; }
  /* stats row */
  .bc-stats { display:flex; gap:8px; margin-bottom:12px; }
  .bc-stat { flex:1; background:var(--surface-low); border-radius:10px; padding:12px; text-align:center; border:1px solid var(--border); }
  .bc-stat-val { font-size:18px; font-weight:700; color:var(--text); }
  .bc-stat-lbl { font-size:10px; color:var(--text-muted); margin-top:3px; }
  /* scan summary */
  .bc-scan-item { margin-bottom:12px; }
  .bc-scan-item:last-child { margin-bottom:0; }
  .bc-scan-lbl { font-size:11px; color:var(--accent); margin-bottom:3px; font-weight:600; }
  .bc-scan-txt { font-size:13px; line-height:1.65; color:var(--text); }
  .bc-scan-txt strong { color:var(--text); }
  /* market */
  .bc-mkt-cells { display:flex; gap:8px; margin-bottom:12px; }
  .bc-mkt-cell { flex:1; background:var(--surface-low); border-radius:10px; padding:12px; border:1px solid var(--border); }
  .bc-mkt-val { font-size:16px; font-weight:700; color:var(--text); }
  .bc-mkt-val.green { color:#16a34a; }
  .bc-mkt-lbl { font-size:10px; color:var(--text-muted); margin-top:3px; }
  /* market bars */
  .bc-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .bc-bar-name { font-size:12px; width:100px; flex-shrink:0; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bc-bar-name.self { color:var(--accent); font-weight:600; }
  .bc-bar-track { flex:1; height:7px; background:var(--border); border-radius:4px; overflow:hidden; }
  .bc-bar-fill { height:100%; border-radius:4px; background:#cbd5e1; }
  .bc-bar-fill.self { background:var(--accent); }
  .bc-bar-count { font-size:11px; color:var(--text-muted); width:44px; text-align:right; flex-shrink:0; }
  .bc-core-mkt { margin-top:12px; font-size:12px; color:var(--text-muted); }
  /* axis */
  .bc-axis-wrap { position:relative; margin:0 8px 8px; }
  .bc-axis-line { position:absolute; top:32px; left:0; right:0; height:2px; background:var(--border); }
  .bc-axis-node { position:absolute; top:32px; transform:translate(-50%,-50%); }
  .bc-axis-dot { width:8px; height:8px; border-radius:50%; background:#cbd5e1; }
  .bc-axis-dot.self { width:13px; height:13px; background:var(--accent); box-shadow:0 0 0 4px rgba(37,99,235,0.15); }
  .bc-axis-lbl { font-size:9px; color:var(--text-muted); white-space:nowrap; position:absolute; top:calc(100% + 6px); left:50%; transform:translateX(-50%); }
  .bc-axis-lbl.self { color:var(--accent); font-weight:700; }
  .bc-axis-range { position:absolute; top:32px; height:4px; background:rgba(37,99,235,0.1); border-radius:2px; transform:translateY(-50%); }
  .bc-axis-range.self { background:rgba(37,99,235,0.25); }
  .bc-axis-ends { display:flex; justify-content:space-between; font-size:10px; color:var(--text-muted); padding:0 4px; margin-top:8px; }
  /* competitors */
  .bc-tier-label { font-size:10px; font-weight:700; color:var(--text-muted); margin-bottom:8px; display:flex; align-items:center; gap:6px; letter-spacing:0.04em; }
  .bc-tier-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .bc-td-head { background:#6366f1; } .bc-td-direct { background:var(--accent); } .bc-td-growth { background:#f59e0b; }
  .bc-comp-card { background:var(--surface-low); border-radius:10px; padding:13px; margin-bottom:8px; border:1px solid var(--border); }
  .bc-comp-card.self-card { background:#eff6ff; border-color:#bfdbfe; }
  .bc-comp-card.warn-card { background:#fffbeb; border-color:#fde68a; }
  .bc-comp-row { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .bc-comp-name { font-size:13px; font-weight:600; color:var(--text); }
  .bc-comp-name.self { color:var(--accent); }
  .bc-comp-meta { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .bc-comp-right { text-align:right; flex-shrink:0; }
  .bc-comp-stores { font-size:15px; font-weight:700; color:var(--text); }
  .bc-comp-price { font-size:11px; color:var(--text-muted); }
  .bc-comp-insight { margin-top:9px; font-size:12px; color:#555; line-height:1.55; border-top:1px solid var(--border); padding-top:8px; }
  .bc-warn-badge { display:inline-block; background:#fef3c7; color:#b45309; font-size:10px; border-radius:4px; padding:1px 6px; margin-left:5px; }
  /* social */
  .bc-social-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .bc-social-row:last-child { border-bottom:none; }
  .bc-social-ico { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; background:var(--surface-low); }
  .bc-soc-plat { font-size:13px; font-weight:600; color:var(--text); }
  .bc-soc-val { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .bc-soc-note { font-size:12px; color:var(--text-muted); margin-top:3px; line-height:1.5; }
  /* ability */
  .bc-ability-sec { margin-bottom:12px; }
  .bc-ability-sec-title { font-size:10px; font-weight:700; color:var(--text-muted); margin-bottom:7px; letter-spacing:0.04em; }
  .bc-ability-item { display:flex; align-items:flex-start; gap:8px; margin-bottom:7px; }
  .bc-ability-badge { padding:2px 7px; border-radius:5px; font-size:11px; font-weight:600; flex-shrink:0; margin-top:1px; }
  .bc-ab-strong { background:#dcfce7; color:#15803d; }
  .bc-ab-mid { background:#fef9c3; color:#a16207; }
  .bc-ab-weak { background:#fee2e2; color:#b91c1c; }
  .bc-ability-text { font-size:12px; color:var(--text); line-height:1.5; }
  /* diagnosis */
  .bc-diag-item { margin-bottom:12px; }
  .bc-diag-item:last-child { margin-bottom:0; }
  .bc-diag-lbl { font-size:10px; font-weight:700; margin-bottom:3px; letter-spacing:0.03em; }
  .bc-diag-lbl.because { color:#dc2626; }
  .bc-diag-lbl.therefore { color:#d97706; }
  .bc-diag-lbl.action { color:var(--accent); }
  .bc-diag-txt { font-size:13px; color:var(--text); line-height:1.65; }
  .bc-cta-btn { display:block; background:var(--accent); color:#fff; text-align:center; padding:11px; border-radius:var(--radius); font-size:13px; font-weight:600; margin-top:12px; cursor:pointer; border:none; font-family:inherit; width:100%; }
  /* footer */
  .bc-footer { text-align:center; font-size:10px; color:var(--text-muted); padding:14px 0 6px; }
  /* tabs */
  .bc-mtabs { display:flex; gap:6px; margin-bottom:12px; }
  .bc-mtab { flex:1; text-align:center; font-size:11px; font-weight:600; padding:7px 4px; border-radius:8px; cursor:pointer; background:var(--surface-low); color:var(--text-muted); border:1px solid var(--border); font-family:inherit; }
  .bc-mtab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .bc-mpanel { display:none; }
  .bc-mpanel.active { display:block; }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <div class="logo-name">商户助手</div>
    <div class="logo-sub">设置你的商家，开始经营分析</div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-step" id="prog-1"></div>
    <div class="progress-step" id="prog-2"></div>
    <div class="progress-step" id="prog-3"></div>
    <div class="progress-step" id="prog-4"></div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Step 0: Region -->
    <div class="step active" id="step-region">
      <div class="card-title">你的品牌在哪个市场？</div>
      <div class="card-sub">选择主要运营区域，我们会匹配对应的数据源</div>
      <div class="type-options">
        <button class="type-btn" onclick="selectRegion('cn')">
          <div class="type-icon">🇨🇳</div>
          <div>
            <div class="type-label">中国大陆</div>
            <div class="type-desc">使用高德地图数据，支持国内品牌库查询</div>
          </div>
        </button>
        <button class="type-btn" onclick="selectRegion('id')">
          <div class="type-icon">🇮🇩</div>
          <div>
            <div class="type-label">印度尼西亚</div>
            <div class="type-desc">使用 Google Maps 数据，支持印尼品牌库查询</div>
          </div>
        </button>
      </div>
    </div>

    <!-- Step 1: Type -->
    <div class="step" id="step-type">
      <button class="back-btn" onclick="goBackToRegion()">← 返回</button>
      <div class="card-title">你的商家是哪种情况？</div>
      <div class="card-sub">根据你的情况，我们会帮你建立初始知识库</div>
      <div class="type-options">
        <button class="type-btn" onclick="selectType('existing')">
          <div class="type-icon">🏬</div>
          <div>
            <div class="type-label">已有品牌在运营</div>
            <div class="type-desc">已经有门店在营业，想获取 AI 经营分析支持</div>
          </div>
        </button>
        <button class="type-btn" onclick="selectType('new')">
          <div class="type-icon">✨</div>
          <div>
            <div class="type-label">新品牌 / 独立门店</div>
            <div class="type-desc">正在筹备或刚起步，先建立基础分析框架</div>
          </div>
        </button>
      </div>
    </div>

    <!-- Step 2a: Existing brand search -->
    <div class="step" id="step-search">
      <button class="back-btn" onclick="goTo('type')">← 返回</button>
      <div class="card-title">搜索你的品牌</div>
      <div class="card-sub" id="search-sub">输入品牌名，我们从 Google Maps 找到你的门店数据</div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          class="search-input"
          id="search-input"
          type="text"
          placeholder="例如：Tomoro Coffee、McDonald's..."
          autocomplete="off"
        />
      </div>
      <div id="search-status"></div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- Step 2b: New brand name -->
    <div class="step" id="step-new">
      <button class="back-btn" onclick="goTo('type')">← 返回</button>
      <div class="card-title">你的品牌叫什么？</div>
      <div class="card-sub">输入品牌名，我们帮你建立基础分析框架</div>
      <div class="field-label">品牌名称 *</div>
      <input class="field-input" id="new-brand-input" type="text" placeholder="你的品牌名称" />
      <div id="new-brand-error" class="error-msg"></div>
      <button class="btn-primary" onclick="confirmNewBrand()">继续 →</button>
    </div>

    <!-- Step 3: Confirm brand -->
    <div class="step" id="step-confirm">
      <button class="back-btn" onclick="goBackFromConfirm()">← 返回</button>
      <div class="card-title">确认这是你的品牌？</div>
      <div class="card-sub">确认后我们将为你生成初始知识库</div>
      <div class="confirm-card" id="confirm-card-content"></div>
      <button class="btn-primary" id="confirm-btn" onclick="confirmBrand()">✓ 确认，这是我的品牌</button>
      <button class="btn-secondary" onclick="goBackFromConfirm()">不对，重新搜索</button>
    </div>

    <!-- Step 4: Generating KB -->
    <div class="step" id="step-generating">
      <div id="gen-loading">
        <div class="card-title">正在生成品牌画像</div>
        <div class="card-sub">AI 正在分析品牌信息，请稍候（约 30 秒）</div>
        <div class="gen-status">
          <div class="spinner"></div>
          <span id="gen-status-text">正在分析品牌数据...</span>
        </div>
        <div class="gen-text-preview" id="gen-preview"></div>
        <button class="btn-secondary" style="margin-top:16px" onclick="skipToMain()">跳过，直接进入</button>
      </div>
    </div>

  </div>

  <!-- Skip link (shown in early steps) -->
  <div class="skip-link" id="skip-link">
    <a onclick="skipToMain()">跳过，稍后再设置</a>
  </div>

</div>

<!-- ══ 品牌画像全屏展示（生成完成后替换页面） ══ -->
<div id="brand-canvas" style="display:none; position:fixed; inset:0; z-index:9999; background:var(--bg); overflow-y:auto;">
  <!-- topbar -->
  <div style="background:#fff; border-bottom:1px solid var(--border); padding:14px 24px; position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:10px;">
    <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;">🏪</div>
    <span style="font-size:15px;font-weight:700;color:var(--text);">商户助手</span>
    <span style="margin-left:auto;font-size:11px;color:var(--accent);background:#eff6ff;padding:3px 10px;border-radius:20px;font-weight:600;">⚡ 品牌初始扫描</span>
  </div>
  <!-- content injected by renderBrandCanvas() -->
  <div style="display:flex;justify-content:center;padding:32px 24px 120px;">
    <div id="canvas-body" style="width:100%;max-width:680px;"></div>
  </div>
  <!-- CTA fixed bottom -->
  <div style="position:fixed;bottom:0;left:0;right:0;padding:16px 24px 24px;background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:10;display:flex;justify-content:center;">
    <button onclick="goToMain()" style="width:100%;max-width:680px;background:var(--accent);color:white;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,0.3);">
      开始使用 →
    </button>
  </div>
</div>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:8081' : '';

  let currentRegion = 'id';  // 'cn' | 'id'
  let currentType = '';
  let selectedCandidate = null;
  let boundMerchantId = null;

  fetch(`${API}/auth/me`, { credentials: 'include' })
    .then(r => { if (!r.ok) { window.location.replace('/login.html'); return; } return r.json(); })
    .then(data => {
      if (!data) return;
      const isRebind = new URLSearchParams(location.search).get('rebind');
      if (data.merchant && !isRebind) window.location.replace('/index.html');
      if (data.merchant && isRebind) {
        // Pre-fill region from existing merchant meta, skip region step
        const meta = data.merchant.meta || {};
        if (meta.region) {
          selectRegion(meta.region);
          goTo('type');
        }
      }
    })
    .catch(() => window.location.replace('/login.html'));

  // ── Navigation ──────────────────────────────────────────────────────────
  function goTo(step) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step-' + step).classList.add('active');
    updateProgress(step);
    document.getElementById('skip-link').style.display = (step === 'generating') ? 'none' : '';
  }

  function updateProgress(step) {
    const map = { region: 0, type: 1, search: 2, new: 2, confirm: 3, generating: 4 };
    const active = map[step] ?? 0;
    [1, 2, 3, 4].forEach(i => {
      const el = document.getElementById(`prog-${i}`);
      el.className = 'progress-step' + (i - 1 < active ? ' done' : (i - 1 === active ? ' active' : ''));
    });
  }

  function selectRegion(region) {
    currentRegion = region;
    // Update search hint based on region
    const sub = document.getElementById('search-sub');
    if (sub) sub.textContent = region === 'cn'
      ? '输入品牌名，从高德地图和国内品牌库查询门店数据'
      : '输入品牌名，我们从 Google Maps 找到你的门店数据';
    const inp = document.getElementById('search-input');
    if (inp) inp.placeholder = region === 'cn' ? '例如：瑞幸咖啡、海底捞...' : "例如：Tomoro Coffee、McDonald's...";
    goTo('type');
  }

  function selectType(type) {
    currentType = type;
    if (type === 'existing') { goTo('search'); setTimeout(() => document.getElementById('search-input').focus(), 50); }
    else { goTo('new'); setTimeout(() => document.getElementById('new-brand-input').focus(), 50); }
  }

  function goBackFromConfirm() {
    if (currentType === 'existing') goTo('search'); else goTo('new');
  }

  // back button on step-type goes to region selection
  function goBackToRegion() { goTo('region'); }

  // ── Search ──────────────────────────────────────────────────────────────
  let searchTimer = null;
  document.addEventListener('DOMContentLoaded', () => {
    const inp = document.getElementById('search-input');
    if (inp) inp.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = inp.value.trim();
      if (q.length < 1) { document.getElementById('search-results').innerHTML = ''; document.getElementById('search-status').innerHTML = ''; return; }
      searchTimer = setTimeout(() => doSearch(q), 400);
    });
    const inp2 = document.getElementById('new-brand-input');
    if (inp2) inp2.addEventListener('keydown', e => { if (e.key === 'Enter') confirmNewBrand(); });
  });

  async function doSearch(q) {
    document.getElementById('search-status').innerHTML = '<div class="search-loading">搜索中...</div>';
    document.getElementById('search-results').innerHTML = '';
    try {
      const res = await fetch(`${API}/onboarding/search?q=${encodeURIComponent(q)}&region=${currentRegion}`, { credentials: 'include' });
      renderResults((await res.json()).candidates || [], q);
    } catch { document.getElementById('search-status').innerHTML = '<div class="search-loading">搜索失败，请重试</div>'; }
  }

  function renderResults(candidates, q) {
    document.getElementById('search-status').innerHTML = '';
    const container = document.getElementById('search-results');
    if (!candidates.length) {
      container.innerHTML = `<div class="no-result"><div class="no-result-text">没有找到「${q}」相关品牌</div><button class="link-btn" onclick="useAsNewBrand('${q.replace(/'/g,"\\'")}')">以新品牌继续 →</button></div>`;
      return;
    }
    container.innerHTML = candidates.map((c, i) => `
      <div class="result-item" onclick="selectCandidate(${i})">
        ${c.photo_url ? `<img class="result-photo" src="${c.photo_url}" alt="${c.name}" onerror="this.style.display='none'" />` : `<div class="result-photo-placeholder">🏪</div>`}
        <div class="result-info">
          <div class="result-name">${c.name}${c.store_count > 1 ? ' <span style="font-weight:400;color:var(--text-muted);font-size:12px">(连锁)</span>' : ''}</div>
          <div class="result-meta">${c.rating > 0 ? `⭐ ${c.rating.toFixed(1)}` : ''}${c.review_count > 0 ? ` · ${c.review_count.toLocaleString()} 评价` : ''}${c.store_count > 1 ? ` · ${c.store_count} 家门店` : ''}</div>
          ${c.addresses && c.addresses[0] ? `<div class="result-addr">📍 ${c.addresses[0]}</div>` : ''}
        </div>
        <div class="result-arrow">›</div>
      </div>`).join('');
    window._searchCandidates = candidates;
  }

  function selectCandidate(idx) {
    selectedCandidate = (window._searchCandidates || [])[idx];
    if (selectedCandidate) showConfirm(selectedCandidate);
  }

  function useAsNewBrand(name) {
    currentType = 'new';
    document.getElementById('new-brand-input').value = name;
    goTo('new');
  }

  function confirmNewBrand() {
    const name = document.getElementById('new-brand-input').value.trim();
    if (!name) { document.getElementById('new-brand-error').textContent = '请输入品牌名称'; return; }
    selectedCandidate = { name, place_ids: [], store_count: 1, rating: 0, review_count: 0, addresses: [], merchant_type: 'new' };
    showConfirm(selectedCandidate);
  }

  // ── Confirm ─────────────────────────────────────────────────────────────
  function showConfirm(c) {
    const el = document.getElementById('confirm-card-content');
    const isNew = currentType === 'new' || c.merchant_type === 'new';
    let html = '';
    if (c.photo_url) html += `<img class="confirm-photo" src="${c.photo_url}" alt="${c.name}" onerror="this.remove()" />`;
    html += `<div class="confirm-name">${c.name}</div><div class="confirm-meta">`;
    if (c.rating > 0) html += `<span class="confirm-badge">⭐ ${c.rating.toFixed(1)}</span>`;
    if (c.review_count > 0) html += `<span class="confirm-badge">${c.review_count.toLocaleString()} 评价</span>`;
    if (c.store_count > 1) html += `<span class="confirm-badge">🏪 ${c.store_count} 家门店</span>`;
    if (c.chain_kb && c.chain_kb.category) html += `<span class="confirm-badge">${c.chain_kb.category}</span>`;
    if (isNew) html += `<span class="confirm-badge">新品牌</span>`;
    html += `</div>`;
    if (c.addresses && c.addresses.length) html += `<div class="confirm-addrs">` + c.addresses.slice(0,2).map(a=>`📍 ${a}`).join('<br>') + `</div>`;
    el.innerHTML = html;
    goTo('confirm');
  }

  async function confirmBrand() {
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true; btn.textContent = '保存中...';
    try {
      const c = selectedCandidate;
      const res = await fetch(`${API}/onboarding/bind`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
        body: JSON.stringify({ name: c.name, place_ids: c.place_ids||[], store_count: c.store_count||1, rating: c.rating||0, review_count: c.review_count||0, addresses: c.addresses||[], chain_kb: c.chain_kb||null, merchant_type: currentType, brand_profile_id: c.brand_profile_id||null, region: currentRegion }),
      });
      if (!res.ok) { alert('绑定失败，请重试'); btn.disabled = false; btn.textContent = '✓ 确认，这是我的品牌'; return; }
      boundMerchantId = (await res.json()).merchant_id;
    } catch { alert('网络错误，请重试'); btn.disabled = false; btn.textContent = '✓ 确认，这是我的品牌'; return; }
    goTo('generating');
    startGenerateKB();
  }

  // ── Generate KB & render canvas ──────────────────────────────────────────
  async function startGenerateKB() {
    if (!boundMerchantId || !selectedCandidate) { goToMain(); return; }
    const previewEl = document.getElementById('gen-preview');
    const statusEl = document.getElementById('gen-status-text');
    try {
      const res = await fetch(`${API}/onboarding/generate-kb`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
        body: JSON.stringify({ merchant_id: boundMerchantId, brand_name: selectedCandidate.name, merchant_type: currentType, chain_kb: selectedCandidate.chain_kb||null, brand_profile_id: selectedCandidate.brand_profile_id||null }),
      });
      if (!res.ok || !res.body) { goToMain(); return; }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '', eventName = '', hasProfile = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop() || '';
        for (const line of lines) {
          if (line.startsWith('event: ')) { eventName = line.slice(7).trim(); continue; }
          if (line.startsWith('data: ')) {
            try {
              const payload = JSON.parse(line.slice(6));
              if (eventName === 'status') { statusEl.textContent = payload.msg; }
              else if (eventName === 'chunk') { previewEl.textContent += payload.text; previewEl.scrollTop = previewEl.scrollHeight; }
              else if (eventName === 'done') { hasProfile = !!payload.has_profile; showCanvas(hasProfile); }
              else if (eventName === 'error') { statusEl.textContent = payload.msg; setTimeout(goToMain, 2500); }
            } catch {}
          }
        }
      }
    } catch { goToMain(); }
  }

  async function showCanvas(hasProfile) {
    if (!hasProfile) { goToMain(); return; }
    try {
      const res = await fetch(`${API}/onboarding/profile`, { credentials: 'include' });
      if (!res.ok) { goToMain(); return; }
      const profile = await res.json();
      if (!profile.profile_json) { goToMain(); return; }
      renderBrandCanvas(profile);
      document.getElementById('brand-canvas').style.display = 'block';
      document.getElementById('brand-canvas').scrollTop = 0;
    } catch { goToMain(); }
  }

  function goToMain() { window.location.replace('/index.html'); }
  function skipToMain() { window.location.replace('/index.html?skip_onboarding=1'); }

  // ── Brand Canvas Renderer ────────────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function safeHtml(s) { return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/&lt;strong&gt;(.+?)&lt;\/strong&gt;/g,'<strong>$1</strong>'); }
  function src(type) {
    const map = { places:'<span class="bc-src bc-sp">Places</span>', chains:'<span class="bc-src bc-sc">chains</span>', calc:'<span class="bc-src bc-sk">计算值</span>', ai:'<span class="bc-src bc-sl">AI推断</span>' };
    return map[type] || '';
  }
  function ratingClass(r) { return r >= 4.5 ? 'bc-r-hi' : r >= 4.0 ? 'bc-r-md' : 'bc-r-lo'; }

  function renderBrandCanvas(profile) {
    const container = document.getElementById('canvas-body');
    _renderCanvasHTML(profile, container, 'bc-ability', 'bcTab');
  }

  function _renderCanvasHTML(profile, container, tabPrefix, tabFnName) {
    const p = profile.profile_json;
    const m = profile.meta || {};
    const ckb = profile.chain_kb || {};
    const brandName = profile.brand_name;
    const ss = p.scan_summary || {};
    const mkt = p.market || {};
    const pos = p.positioning || {};
    const social = p.social || [];
    const comps = p.competitors || {};
    const ability = p.ability || {};
    const diag = p.diagnosis || {};

    const sampleSize = m.sample_size || 1;
    const isCn = ckb.origin === 'CN' || ckb.region === 'cn' || currentRegion === 'cn';
    const catLower = (ckb.category||'').toLowerCase();
    const icoEmoji = catLower.includes('咖啡')||catLower.includes('coffee') ? '☕'
      : catLower.includes('茶')||catLower.includes('tea') ? '🍵'
      : catLower.includes('鸡')||catLower.includes('chicken') ? '🍗' : '🏪';

    // ── stat-row values ──
    const ratingVal = isCn ? (ckb.avg_rating_amap || m.rating) : m.rating;
    const stat1Val = ratingVal ? parseFloat(ratingVal).toFixed(1) : '—';
    const stat1Lbl = isCn ? '大众点评均分' : 'Google评分';

    let stat2Val, stat2Lbl;
    if (isCn) {
      stat2Val = ckb.avg_price_amap ? '¥' + ckb.avg_price_amap : (ckb.priceBand || '—');
      stat2Lbl = '客单价区间';
    } else {
      stat2Val = ckb.priceBand ? ckb.priceBand.replace('Rp ','').replace('Rp','') : '—';
      stat2Lbl = '价格带';
    }

    const stat3Val = isCn ? (ckb.storeCount || m.store_count || '—') : (m.review_count ? m.review_count.toLocaleString() : '—');
    const stat3Lbl = isCn ? '全国门店数' : '总评论（样本）';

    let html = '';

    // ── 头部 ──
    html += `<div class="bc-brand-head">
      <div class="bc-brand-ico">${icoEmoji}</div>
      <div>
        <div class="bc-brand-name">${esc(brandName)}</div>
        <div class="bc-brand-sub">${esc(ckb.category||'')}${ckb.origin ? ' · ' + esc(ckb.origin==='CN'?'中国':'Indonesia') : ''}${ckb.founded ? ' · ' + ckb.founded : ''}</div>
      </div>
      <div class="bc-scan-badge">品牌扫描</div>
    </div>`;

    // ── Stats 行 ──
    html += `<div class="bc-stats">
      <div class="bc-stat"><div class="bc-stat-val">${stat1Val}</div><div class="bc-stat-lbl">${stat1Lbl}</div></div>
      <div class="bc-stat"><div class="bc-stat-val">${stat2Val}</div><div class="bc-stat-lbl">${stat2Lbl}</div></div>
      <div class="bc-stat"><div class="bc-stat-val">${esc(String(stat3Val))}</div><div class="bc-stat-lbl">${stat3Lbl}</div></div>
    </div>`;

    // ── 扫描摘要 ──
    if (ss.mirror || ss.window || ss.door || ss.action) {
      html += `<div class="bc-card"><div class="bc-card-title">平台扫描摘要</div>`;
      if (ss.mirror) html += `<div class="bc-scan-item"><div class="bc-scan-lbl">🪞 现状</div><div class="bc-scan-txt">${safeHtml(ss.mirror)}</div></div>`;
      if (ss.window) html += `<div class="bc-scan-item"><div class="bc-scan-lbl">🔍 洞察</div><div class="bc-scan-txt">${safeHtml(ss.window)}</div></div>`;
      if (ss.door)   html += `<div class="bc-scan-item"><div class="bc-scan-lbl">🚪 行动</div><div class="bc-scan-txt">${safeHtml(ss.door)}</div></div>`;
      if (ss.action) html += `<div class="bc-scan-item"><div class="bc-scan-lbl">⚡ 平台重点</div><div class="bc-scan-txt">${safeHtml(ss.action)}</div></div>`;
      html += `</div>`;
    }

    // ── 市场格局 ──
    const hasMktBar = mkt.market_bar_data && mkt.market_bar_data.length;
    const hasAxis = pos.axis_items && pos.axis_items.length;
    if (mkt.market_size || mkt.yoy_growth || hasMktBar) {
      html += `<div class="bc-card"><div class="bc-card-title">市场格局</div>
        <div class="bc-mkt-cells">
          <div class="bc-mkt-cell"><div class="bc-mkt-val">${esc(mkt.market_size||'—')}</div><div class="bc-mkt-lbl">${esc(ckb.category||'')}市场规模</div></div>
          <div class="bc-mkt-cell"><div class="bc-mkt-val green">${esc(mkt.yoy_growth||'—')}</div><div class="bc-mkt-lbl">年复合增速</div></div>
        </div>`;
      if (hasMktBar) {
        html += `<div id="${tabPrefix}-mkt-bars"></div>`;
      }
      if (mkt.core_market) {
        html += `<div class="bc-core-mkt">📍 ${esc(mkt.core_market)}</div>`;
      }
      html += `</div>`;
    }

    // ── 价格定位轴 ──
    if (hasAxis) {
      const axisId = tabPrefix + '-axis';
      html += `<div class="bc-card"><div class="bc-card-title">价格定位轴</div>
        <div id="${axisId}" class="bc-axis-wrap" style="height:100px;"></div>
        <div class="bc-axis-ends"><span>低价</span><span>高价</span></div>
      </div>`;
    }

    // ── 竞品图谱 ──
    const allCompItems = [...(comps.head||[]), ...(comps.direct||[]), ...(comps.growth||[])];
    if (allCompItems.length) {
      html += `<div class="bc-card"><div class="bc-card-title">竞品图谱</div>`;

      function renderTier(tier, label, dotCls) {
        const items = comps[tier] || [];
        if (!items.length) return '';
        let t = `<div style="margin-bottom:16px;"><div class="bc-tier-label"><span class="bc-tier-dot ${dotCls}"></span>${label}</div>`;
        for (const c of items) {
          const isSelf = !!c.is_self;
          const isWarn = !isSelf && !!c.is_warn;
          const cardCls = 'bc-comp-card' + (isSelf?' self-card':isWarn?' warn-card':'');
          const priceLbl = isCn
            ? (c.price_band || '—')
            : (c.price_band ? c.price_band.replace('Rp ','').replace('Rp','') : '—');
          t += `<div class="${cardCls}">
            <div class="bc-comp-row">
              <div>
                <div class="bc-comp-name${isSelf?' self':''}">${esc(c.name)}${isWarn?` <span class="bc-warn-badge">⚡ 威胁</span>`:''}</div>
                <div class="bc-comp-meta">${esc(c.category||'')}${c.founded ? ' · 创立 ' + c.founded : ''}</div>
              </div>
              <div class="bc-comp-right">
                <div class="bc-comp-stores" style="${isSelf?'color:#4a9eff':''}">${c.store_count != null ? c.store_count.toLocaleString() : '—'}</div>
                <div class="bc-comp-price">${priceLbl}</div>
              </div>
            </div>`;
          if (c.insight) t += `<div class="bc-comp-insight">${esc(c.insight)}</div>`;
          t += `</div>`;
        }
        t += `</div>`;
        return t;
      }

      html += renderTier('head',   '头部参照',   'bc-td-head');
      html += renderTier('direct', '直接竞争',   'bc-td-direct');
      html += renderTier('growth', '成长型威胁', 'bc-td-growth');
      html += `</div>`;
    }

    // ── 社媒声量 ──
    if (social.length) {
      const platIco = { '微信':'💬','微信公众号':'💬','抖音':'🎵','微博':'🔵','小红书':'📕','Instagram':'📸','TikTok':'🎵','Facebook':'👤','美团':'🛵','饿了么':'🛵','YouTube':'▶️' };
      const platBg  = { '微信':'rgba(7,193,96,0.15)','微信公众号':'rgba(7,193,96,0.15)','抖音':'rgba(255,0,80,0.15)','微博':'rgba(30,120,255,0.15)','小红书':'rgba(255,60,60,0.15)','美团':'rgba(255,144,0,0.15)','饿了么':'rgba(0,164,255,0.15)','Instagram':'rgba(200,50,150,0.15)','TikTok':'rgba(0,0,0,0.3)','Facebook':'rgba(24,119,242,0.15)' };
      html += `<div class="bc-card"><div class="bc-card-title">社媒声量</div>`;
      for (const s of social) {
        const ico = platIco[s.platform] || '📱';
        const bg  = platBg[s.platform]  || 'rgba(74,158,255,0.15)';
        html += `<div class="bc-social-row">
          <div class="bc-social-ico" style="background:${bg}">${ico}</div>
          <div>
            <div class="bc-soc-plat">${esc(s.platform)}</div>
            <div class="bc-soc-val">${esc(s.followers||'—')}</div>
            <div class="bc-soc-note">${esc(s.note||'')}${s.handle ? ' @'+esc(s.handle) : ''}</div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }

    // ── 经营能力评估 ──
    const abilityKeys = [['basic','🏗 基础运营'],['growth','📈 增长引擎'],['scale','🚀 规模效率']];
    const hasAbility = abilityKeys.some(([k]) => (ability[k]||[]).length);
    if (hasAbility) {
      html += `<div class="bc-card"><div class="bc-card-title">经营能力评估</div>`;
      for (const [key, secTitle] of abilityKeys) {
        const rows = ability[key] || [];
        if (!rows.length) continue;
        html += `<div class="bc-ability-sec"><div class="bc-ability-sec-title">${secTitle}</div>`;
        for (const row of rows) {
          const lvl = row.level === 'strong' ? 'strong' : row.level === 'mid' ? 'mid' : 'weak';
          const lvlTxt = lvl === 'strong' ? '强' : lvl === 'mid' ? '中' : '弱';
          html += `<div class="bc-ability-item">
            <span class="bc-ability-badge bc-ab-${lvl}">${lvlTxt}</span>
            <span class="bc-ability-text">${esc(row.title)}${row.module ? `<br><span style="font-size:11px;color:#666;">→ 平台模块：${esc(row.module)}</span>` : ''}</span>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }

    // ── 核心诊断 ──
    if (diag.because || diag.therefore || diag.action) {
      html += `<div class="bc-card"><div class="bc-card-title">核心诊断</div>`;
      if (diag.because)   html += `<div class="bc-diag-item"><div class="bc-diag-lbl because">🔴 现状</div><div class="bc-diag-txt">${esc(diag.because)}</div></div>`;
      if (diag.therefore) html += `<div class="bc-diag-item"><div class="bc-diag-lbl therefore">🟡 本质</div><div class="bc-diag-txt">${esc(diag.therefore)}</div></div>`;
      if (diag.action)    html += `<div class="bc-diag-item"><div class="bc-diag-lbl action">🔵 行动</div><div class="bc-diag-txt">${esc(diag.action)}</div></div>`;
      html += `</div>`;
    }

    // ── 页脚 ──
    html += `<div class="bc-footer">由 Shopilot AI 生成 · 数据来源：${isCn?'高德地图采样':'Google Places API · '+sampleSize+'家样本'} + 公开信息 · 仅供参考</div>`;

    container.innerHTML = html;

    // ── Post-render: market bars ──
    if (hasMktBar) {
      const wrap = container.querySelector(`#${tabPrefix}-mkt-bars`);
      if (wrap) {
        const bars = mkt.market_bar_data;
        const maxV = Math.max(...bars.map(d => d.store_count||d.pct||1));
        wrap.innerHTML = bars.map(d => {
          const cnt = d.store_count || 0;
          const pct = Math.round(cnt / maxV * 100);
          const cntStr = cnt >= 1000 ? (cnt/1000).toFixed(cnt%1000===0?0:1)+'k' : (cnt||'');
          return `<div class="bc-bar-row">`
            + `<div class="bc-bar-name${d.is_self?' self':''}">${esc(d.name)}${d.is_self?' ▶':''}</div>`
            + `<div class="bc-bar-track"><div class="bc-bar-fill${d.is_self?' self':''}" style="width:${pct}%"></div></div>`
            + `<div class="bc-bar-count">${cntStr}</div>`
            + `</div>`;
        }).join('');
      }
    }

    // ── Post-render: price axis ──
    if (hasAxis) {
      const axisEl = container.querySelector(`#${tabPrefix}-axis`);
      if (axisEl) _renderPriceAxis(axisEl, pos.axis_items, isCn);
    }
  }

  function _renderPriceAxis(axisEl, items, isCn) {
    const PADDING = 0.08;
    const allP = items.flatMap(b => [b.price_low||0, b.price_high||0]);
    const minP = Math.min(...allP), maxP = Math.max(...allP);
    const range = maxP - minP || 1;
    const toLeft = p => PADDING*100 + ((p-minP)/range)*(1-2*PADDING)*100;
    const sorted = [...items].sort((a,b) => (a.price_low+a.price_high)-(b.price_low+b.price_high));
    const mids = sorted.map(b => toLeft(((b.price_low||0)+(b.price_high||0))/2));
    const offsets = new Array(sorted.length).fill(0);
    for (let i=1; i<mids.length; i++) if (mids[i]-mids[i-1] < 9) offsets[i] = offsets[i-1]+14;
    axisEl.style.height = (88 + Math.max(...offsets)) + 'px';

    const line = document.createElement('div'); line.className = 'bc-axis-line'; axisEl.appendChild(line);
    sorted.forEach((b, i) => {
      const mid = ((b.price_low||0)+(b.price_high||0))/2;
      const lp = toLeft(b.price_low||0), hp = toLeft(b.price_high||0);
      const rangeEl = document.createElement('div');
      rangeEl.className = 'bc-axis-range' + (b.is_self?' self':'');
      rangeEl.style.cssText = 'left:'+lp+'%;width:'+(hp-lp)+'%';
      axisEl.appendChild(rangeEl);

      const node = document.createElement('div');
      node.className = 'bc-axis-node'; node.style.left = toLeft(mid)+'%';

      const dot = document.createElement('div'); dot.className = 'bc-axis-dot'+(b.is_self?' self':'');

      const lbl = document.createElement('div'); lbl.className = 'bc-axis-lbl'+(b.is_self?' self':'');
      lbl.style.top = 'calc(100% + '+(6+offsets[i])+'px)';
      lbl.textContent = b.name.length > 6 ? b.name.slice(0,6)+'…' : b.name;
      lbl.title = b.name + ' ' + (isCn ? `¥${b.price_low||0}–${b.price_high||0}` : `${Math.round((b.price_low||0)/1000)}–${Math.round((b.price_high||0)/1000)}k`);

      const ph = document.createElement('div');
      ph.style.cssText = 'font-size:8px;color:var(--text-muted);position:absolute;top:calc(100% + '+(20+offsets[i])+'px);left:50%;transform:translateX(-50%);white-space:nowrap';
      ph.textContent = isCn ? `¥${b.price_low||0}–${b.price_high||0}` : `${Math.round((b.price_low||0)/1000)}–${Math.round((b.price_high||0)/1000)}k`;

      node.appendChild(dot); node.appendChild(lbl); node.appendChild(ph);
      axisEl.appendChild(node);
    });
  }

  function bcTab(panelId, btn) {
    const card = btn.closest('.bc-card');
    card.querySelectorAll('.bc-mpanel').forEach(p => p.classList.remove('active'));
    card.querySelectorAll('.bc-mtab').forEach(t => t.classList.remove('active'));
    document.getElementById(panelId).classList.add('active');
    btn.classList.add('active');
  }

  // Init
  goTo('region');
</script>
</body>
</html>
