<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商户助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #003178;
      --primary-dark: #0d47a1;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --bg: #f8f9fa;
      --card: #ffffff;
      --surface: #f3f4f5;
      --border: #e7e8e9;
      --hover: #f0f4ff;
      --text: #1a1d1e;
      --text-muted: #6b7280;
      --user-bubble: #d9e2ff;
      --shadow: 0 2px 8px rgba(25,28,29,0.04);
      --shadow-md: 0 4px 16px rgba(25,28,29,0.08);
      --radius-card: 12px;
      --radius-btn: 8px;
      --radius-tag: 20px;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ─── Root layout ────────────────────────────── */
    #shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Topbar ─────────────────────────────────── */
    #topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      flex-shrink: 0;
      z-index: 10;
    }

    #brand {
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: var(--primary);
    }

    #topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    #status-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-tag);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      transition: background 0.3s;
    }
    #status-dot.online  { background: #22c55e; }
    #status-dot.offline { background: #ef4444; }

    #model-tag {
      padding: 4px 12px;
      border-radius: var(--radius-tag);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #model-switch {
      position: relative;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #model-switch-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-tag);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #model-switch-btn:hover { background: #e8edff; }
    #model-switch-btn .ms-caret { font-size: 9px; color: var(--text-muted); }
    #model-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 200;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      min-width: 200px;
      padding: 6px 0;
    }
    #model-dropdown.hidden { display: none; }
    .ms-provider-header {
      padding: 4px 14px 2px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .ms-model-item {
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.12s;
    }
    .ms-model-item:hover { background: var(--hover); }
    .ms-model-item.active { color: var(--primary); font-weight: 600; }
    .ms-model-item.active::after { content: '✓'; margin-left: auto; font-size: 11px; }
    .ms-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ─── Content row ────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── Chat pane ──────────────────────────────── */
    #chat-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 300px;
      overflow: hidden;
      background: var(--bg);
    }

    /* ─── Divider ────────────────────────────────── */
    #divider {
      width: 4px;
      flex-shrink: 0;
      cursor: col-resize;
      background: var(--border);
      transition: background 0.15s, width 0.15s;
      position: relative;
      z-index: 5;
    }
    #divider:hover, #divider.dragging { background: var(--primary); width: 5px; }

    /* ─── Canvas pane ────────────────────────────── */
    #canvas-pane {
      display: flex;
      flex-direction: column;
      width: 680px;
      min-width: 320px;
      max-width: 1000px;
      background: var(--card);
      border-left: 1px solid var(--border);
      overflow: hidden;
      transition: width 0.2s ease;
    }
    #canvas-pane.collapsed { width: 0 !important; min-width: 0; border-left: none; }

    /* Canvas toggle button on divider */
    #canvas-toggle {
      position: absolute;
      top: 50%;
      right: -14px;
      transform: translateY(-50%);
      width: 20px;
      height: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 12px;
      z-index: 20;
      box-shadow: 2px 0 6px rgba(0,0,0,0.06);
    }
    #canvas-toggle:hover { color: var(--primary); background: #f0f4ff; }

    /* ─── Canvas header ──────────────────────────── */
    #canvas-header {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #canvas-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    #canvas-clear-btn {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      transition: color 0.15s, border-color 0.15s;
      display: none;
    }
    #canvas-clear-btn:hover { color: #ef4444; border-color: #ef4444; }

    /* ─── Canvas body ────────────────────────────── */
    #canvas-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── Module wrapper ─────────────────────────── */
    .canvas-module {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .module-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .module-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* empty state */
    #canvas-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      padding: 40px 20px;
    }
    #canvas-empty-state .empty-icon { font-size: 36px; opacity: 0.35; }

    /* ─── Chart cards in canvas ──────────────────── */
    .canvas-chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px;
      overflow: hidden;
    }
    .canvas-chart-card > div:last-child { width: 100%; }
    .canvas-chart-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    /* ─── Competitor list in canvas ──────────────── */
    .competitor-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 12px 14px;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .competitor-card:hover { box-shadow: var(--shadow-md); border-color: #c7d2fe; }
    .competitor-card .comp-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .competitor-card .comp-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-muted); flex-wrap: wrap; }
    .comp-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 4px;
      background: #eff6ff; color: var(--primary);
      font-size: 11px; font-weight: 500;
    }

    /* ─── Action plan in canvas ──────────────────── */
    .action-item {
      display: flex;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
    }
    .action-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .action-text { font-size: 13px; line-height: 1.5; color: var(--text); }

    /* ─── Analysis cards ─────────────────────────── */
    .analysis-card {
      border-radius: var(--radius-card);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
    }
    .analysis-card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px 12px;
    }
    .analysis-card-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .analysis-card-icon.severity-high   { background: #fee2e2; }
    .analysis-card-icon.severity-medium { background: #fef3c7; }
    .analysis-card-icon.severity-low    { background: #dcfce7; }
    .analysis-card-icon.type-opportunity{ background: #eff6ff; }
    .analysis-card-icon.type-paradox    { background: #fdf4ff; }
    .analysis-card-icon.type-action     { background: #f0fdf4; }
    .analysis-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
    }
    .analysis-card-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .analysis-card-body {
      padding: 0 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .analysis-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 6px;
      align-items: baseline;
    }
    .analysis-row-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-top: 1px;
    }
    .analysis-row-value {
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.5;
    }
    .analysis-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    .analysis-actions {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 16px 14px;
    }
    .analysis-action-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.45;
    }
    .analysis-action-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .dot-now    { background: #ef4444; }
    .dot-week   { background: #f59e0b; }
    .dot-later  { background: #22c55e; }
    .dot-track  { background: #8b5cf6; }
    .severity-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .badge-high   { background: #fee2e2; color: #dc2626; }
    .badge-medium { background: #fef3c7; color: #d97706; }
    .badge-low    { background: #dcfce7; color: #16a34a; }

    /* ─── Collapsible chart section ──────────────── */
    .chart-section-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .chart-section-toggle:hover { background: #f0f4ff; }
    .chart-section-toggle-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .chart-section-arrow {
      font-size: 12px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .chart-section-arrow.open { transform: rotate(180deg); }
    .chart-section-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .chart-section-body.collapsed { max-height: 0 !important; }
    .chart-jump-badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 8px; padding: 4px 10px;
      background: #eff6ff; color: #2563eb;
      border: 1px solid #bfdbfe; border-radius: 20px;
      font-size: 12px; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .chart-jump-badge:hover { background: #dbeafe; }

    /* ─── Welcome screen ─────────────────────────── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 28px;
    }
    #welcome.hidden { display: none; }
    #welcome-heading h2 {
      font-family: 'Manrope', sans-serif;
      font-size: 24px; font-weight: 800;
      color: var(--primary); margin-bottom: 8px; text-align: center;
    }
    #welcome-heading p { font-size: 14px; color: var(--text-muted); text-align: center; }

    #quick-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 520px;
    }
    .quick-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 18px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 7px;
    }
    .quick-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: #c7d2fe; }
    .quick-card .card-icon { font-size: 22px; }
    .quick-card .card-title { font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }
    .quick-card .card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    /* ─── Messages ───────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #messages.hidden { display: none; }

    @keyframes slideInRight { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideInLeft  { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

    .msg-row { display:flex; align-items:flex-end; gap:8px; }
    .msg-row.user { justify-content:flex-end; animation:slideInRight 0.3s ease; }
    .msg-row.assistant { justify-content:flex-start; animation:slideInLeft 0.3s ease; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px; flex-shrink: 0;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      border-radius: 16px 4px 16px 16px;
      color: var(--text);
    }
    .msg-row.assistant .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      box-shadow: var(--shadow);
    }

    .bubble h1,.bubble h2,.bubble h3 { font-family:'Manrope',sans-serif; margin:10px 0 5px; color:var(--primary); }
    .bubble h1{font-size:16px;} .bubble h2{font-size:14px;} .bubble h3{font-size:13px;}
    .bubble p { margin-bottom:7px; } .bubble p:last-child { margin-bottom:0; }
    .bubble ul,.bubble ol { padding-left:16px; margin-bottom:7px; }
    .bubble li { margin-bottom:3px; }
    .bubble code { background:var(--surface); padding:2px 5px; border-radius:4px; font-size:12px; }
    .bubble pre { background:#1e2937; color:#e2e8f0; padding:10px; border-radius:8px; overflow-x:auto; margin:7px 0; }
    .bubble pre code { background:none; padding:0; color:inherit; font-size:12px; }
    .bubble table { width:100%; border-collapse:collapse; font-size:12px; margin:7px 0; }
    .bubble th,.bubble td { border:1px solid var(--border); padding:5px 9px; text-align:left; }
    .bubble th { background:var(--surface); font-weight:600; }

    /* ─── Thinking ───────────────────────────────── */
    @keyframes pulse-dot {
      0%,80%,100% { transform:scale(0.6); opacity:0.4; }
      40%          { transform:scale(1);   opacity:1; }
    }
    .thinking-row { display:flex; align-items:flex-end; gap:8px; animation:slideInLeft 0.3s ease; }
    .thinking-bubble {
      background:var(--card); border:1px solid var(--border);
      border-radius:4px 16px 16px 16px;
      padding:12px 16px;
      display:flex; gap:5px; align-items:center;
      box-shadow:var(--shadow);
    }
    .thinking-dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--primary); display:inline-block; flex-shrink:0;
      animation:pulse-dot 1.2s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2){animation-delay:0.2s;}
    .thinking-dot:nth-child(3){animation-delay:0.4s;}
    .thinking-label { font-size:12px; color:var(--text-muted); margin-left:6px; white-space:nowrap; }

    /* ─── Input area ─────────────────────────────── */
    #input-area {
      padding: 12px 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #file-list { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:7px; }
    .file-chip {
      display:flex; align-items:center; gap:4px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:3px 9px;
      font-size:11px; color:var(--text-muted);
    }
    .remove-file { cursor:pointer; color:#9ca3af; font-size:13px; transition:color 0.2s; }
    .remove-file:hover { color:#ef4444; }

    #input-row { display:flex; gap:8px; align-items:flex-end; }
    #msg-input {
      flex:1; resize:none;
      border:1px solid var(--border); border-radius:var(--radius-card);
      padding:10px 14px;
      font-family:'Inter',sans-serif; font-size:13.5px;
      color:var(--text); background:var(--surface);
      outline:none; min-height:40px; max-height:130px; line-height:1.5;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    #msg-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(0,49,120,0.08); }
    #msg-input::placeholder { color:var(--text-muted); }

    .icon-btn {
      width:40px; height:40px;
      border:1px solid var(--border); border-radius:var(--radius-btn);
      background:var(--surface); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      color:var(--text-muted); flex-shrink:0;
      transition:background 0.2s, color 0.2s;
    }
    .icon-btn:hover { background:#e8edff; color:var(--primary); border-color:#c7d2fe; }

    #send-btn {

    /* ─── Footer ─────────────────────────────────── */

    .form-group input {

    #modal-skip:hover { color:var(--primary); }

    /* ─── Scrollbar ──────────────────────────────── */

    #messages::-webkit-scrollbar-track,#canvas-body::-webkit-scrollbar-track { background:transparent; }
    #messages::-webkit-scrollbar-thumb,#canvas-body::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }

    /* ── Sidebar ─────────────────────────────────────── */

    #sidebar-toggle {

    .conv-item {

    /* Brief card styles */
    .brief-hero {

    #kb-modal-body .bc-mpanel.active { display:block; }
    #kb-modal-body .bc-canvas-wrap { padding: 12px 12px 24px; box-sizing: border-box; }

    /* File list styles */
    .kb-detail-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .kb-detail-item:last-child { border-bottom: none; }
    .kb-detail-name { flex: 1; color: var(--text); }
    .kb-detail-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .kb-detail-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 13px; opacity: 0.5;
    }
    .kb-detail-del:hover { color: #ef4444; opacity: 1; }

    /* ── Merchant KB folder modal ───────────────────── */
    #mkb-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 40px; z-index: 500;
    }
    #mkb-modal-overlay.hidden { display: none; }
    #mkb-modal {
      background: #fff;
      border-radius: 14px;
      width: 760px; max-width: 96vw;
      max-height: calc(100vh - 80px);
      display: flex; flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    #mkb-modal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: #fff;
    }
    #mkb-modal-title { font-size: 15px; font-weight: 700; flex: 1; color: var(--text); }
    #mkb-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--text-muted); line-height: 1;
      padding: 4px 8px; border-radius: 6px;
    }
    #mkb-modal-close:hover { background: var(--surface); }
    /* Upload zone inside modal */
    #mkb-upload-zone {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 20px 16px; text-align: center;
      margin: 14px 16px 0; cursor: pointer; transition: all 0.15s;
      background: var(--surface);
    }
    #mkb-upload-zone:hover, #mkb-upload-zone.dragover {
      border-color: var(--accent); background: #eff6ff;
    }
    #mkb-upload-zone .uz-icon { font-size: 22px; margin-bottom: 4px; }
    #mkb-upload-zone .uz-text { font-size: 13px; color: var(--text-muted); }
    #mkb-upload-zone .uz-btn {
      margin-top: 8px; display: inline-flex; gap: 8px;
    }
    /* Toolbar */
    #mkb-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 8px; flex-shrink: 0; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    #mkb-breadcrumb { flex: 1; display: flex; align-items: center; gap: 4px; font-size: 13px; flex-wrap: wrap; min-width: 0; }
    .mkb-bc-item { color: var(--accent); cursor: pointer; }
    .mkb-bc-item:hover { text-decoration: underline; }
    .mkb-bc-sep { color: var(--text-muted); }
    #mkb-stats { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    /* File view */
    #mkb-file-view { overflow-y: auto; flex: 1; padding: 8px 4px 16px; min-height: 140px; }
    /* List rows — reuse admin .kb-row style */
    .mkb-row { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.1s; position: relative; }
    .mkb-row:hover { background: var(--surface); }
    .mkb-row:hover .mkb-actions { opacity: 1; }
    .mkb-chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; width: 12px; flex-shrink: 0; }
    .mkb-chevron.open { transform: rotate(90deg); }
    .mkb-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
    .mkb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mkb-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; margin-right: 8px; }
    .mkb-actions { opacity: 0; display: flex; gap: 4px; flex-shrink: 0; transition: opacity 0.15s; }
    .mkb-actions button { padding: 3px 8px; font-size: 11px; border-radius: 5px; border: 1px solid var(--border); background: #fff; color: var(--text-muted); cursor: pointer; font-family: inherit; }
    .mkb-actions button:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }
    .mkb-actions button.danger:hover { background: #fee2e2; color: #ef4444; border-color: #ef4444; }
    .mkb-indent { padding-left: 28px; }
    .mkb-sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    /* Grid */
    .mkb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 16px; }
    .mkb-card { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 8px 12px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; position: relative; background: #fff; }
    .mkb-card:hover { border-color: var(--accent); background: #f0f6ff; }
    .mkb-card:hover .mkb-card-actions { opacity: 1; }
    .mkb-card-icon { font-size: 34px; line-height: 1; }
    .mkb-card-name { font-size: 11px; text-align: center; word-break: break-all; color: var(--text); line-height: 1.4; max-height: 32px; overflow: hidden; }
    .mkb-card-actions { position: absolute; top: 4px; right: 4px; opacity: 0; display: flex; gap: 2px; transition: opacity 0.15s; }
    .mkb-card-actions button { padding: 2px 5px; font-size: 10px; border-radius: 4px; border: 1px solid var(--border); background: #fff; color: var(--text-muted); cursor: pointer; }
    .mkb-card-actions button:hover { background: #fee2e2; color: #ef4444; border-color: #ef4444; }
    /* Folder picker */
    #mkb-folder-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 600;
      align-items: center; justify-content: center;
    }
    #mkb-folder-modal-inner {
      background: #fff; border-radius: 12px;
      padding: 20px; width: 340px; max-width: 92vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .mkb-folder-opt { padding: 8px 12px; cursor: pointer; font-size: 13px; border-radius: 6px; transition: background 0.1s; }
    .mkb-folder-opt:hover { background: var(--surface); }
    .mkb-folder-opt.selected { background: #eff6ff; color: var(--accent); font-weight: 600; }

    /* ── Auth modal ──────────────────────────────────── */
    #auth-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    #auth-modal-overlay.hidden { display: none; }
    #auth-modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 28px 32px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    #auth-modal h2 { margin: 0 0 20px; font-size: 18px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .auth-tab {
      padding: 6px 16px; cursor: pointer; font-size: 14px;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .auth-form.hidden { display: none; }
    .auth-form input {
      padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px;
      background: var(--bg); color: var(--text);
      outline: none;
    }
    .auth-form input:focus { border-color: var(--accent); }
    .auth-submit {
      padding: 10px; background: var(--accent);
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 4px;
    }
    .auth-submit:hover { opacity: 0.88; }
    #auth-error { font-size: 13px; color: #ef4444; min-height: 18px; }

    /* ── User avatar / dropdown ──────────────────────── */
    #user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; cursor: pointer;
      user-select: none; position: relative;
    }
    #user-dropdown {
      position: absolute; top: 38px; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      min-width: 160px; z-index: 200; padding: 4px 0;
    }
    #user-dropdown.hidden { display: none; }
    .dropdown-item {
      padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text);
    }
    .dropdown-item:hover { background: var(--hover); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    @media(max-width:640px) {
      #canvas-pane { display:none; }
      #divider { display:none; }
      #quick-cards { grid-template-columns:1fr; }
      #sidebar { display:none; }
      #sidebar-divider { display:none; }
    }
  </style>
</head>
<body>

<!-- First-run modal -->
<div id="modal-overlay">
  <div id="modal" style="max-width:420px;padding:32px;">
    <h2 style="font-size:18px;margin-bottom:4px;">商家设置</h2>
    <p class="modal-sub" style="margin-bottom:24px;">管理你绑定的商家信息</p>

    <!-- Current merchant info -->
    <div id="merchant-info-block" style="padding:16px;background:#f8faff;border-radius:10px;border:1.5px solid #e2e8f0;margin-bottom:20px;">
      <div style="font-size:12px;color:#64748b;margin-bottom:4px;">当前绑定商家</div>
      <div id="merchant-info-name" style="font-weight:700;font-size:16px;color:#1a1d1e;margin-bottom:6px;"></div>
      <div id="merchant-info-meta" style="font-size:12px;color:#64748b;line-height:1.6;"></div>
    </div>

    <!-- Edit name -->
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;font-weight:500;color:#64748b;margin-bottom:5px;">修改商家名称</div>
      <input type="text" id="merchant-name-input"
        style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;background:#fafbfc;outline:none;"
        onfocus="this.style.borderColor='#2563eb';this.style.boxShadow='0 0 0 3px rgba(37,99,235,0.10)'"
        onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'"
      />
    </div>
    <div id="merchant-settings-error" style="font-size:12px;color:#ef4444;min-height:16px;margin-bottom:8px;"></div>

    <button id="modal-save-btn" style="width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;">保存修改</button>
    <button id="rebind-btn" style="width:100%;padding:10px;background:transparent;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;color:#64748b;cursor:pointer;margin-bottom:10px;">重新选择商家</button>
    <button id="modal-cancel-btn" style="width:100%;padding:10px;background:transparent;border:none;font-size:13px;color:#94a3b8;cursor:pointer;">取消</button>
  </div>
</div>

<!-- App shell -->
<div id="shell">

  <!-- Topbar -->
  <header id="topbar">
    <div id="brand">商户助手<span style="font-size:10px;font-weight:400;opacity:0.45;margin-left:6px;letter-spacing:0">v0.2.0</span></div>
    <div id="topbar-right">
      <div id="status-tag">
        <div id="status-dot"></div>
        <span id="status-text">检测中…</span>
      </div>
      <div id="model-tag">—</div>
      <div id="model-switch">
        <div id="model-switch-btn">
          <span id="ms-label">检测中…</span>
          <span class="ms-caret">▼</span>
        </div>
        <div id="model-dropdown" class="hidden"></div>
      </div>
      <button id="settings-btn" title="设置" style="background:none;border:none;cursor:pointer;font-size:18px;padding:4px 6px;color:var(--text-muted);line-height:1;">⚙</button>
      <div id="user-avatar" title="账号">?</div>
      <div id="user-dropdown" class="hidden">
        <div class="dropdown-item" id="dropdown-email" style="color:var(--text-muted);cursor:default;font-size:12px;"></div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" id="admin-link" style="display:none">管理后台</div>
        <div class="dropdown-item" id="logout-btn">退出登录</div>
      </div>
    </div>
  </header>

  <!-- Content -->
  <div id="content">

    <!-- Sidebar -->
    <div id="sidebar">
      <!-- User card at top -->
      <div id="sidebar-user-card">
        <div id="sidebar-avatar"></div>
        <div id="sidebar-user-info">
          <div id="sidebar-user-name"></div>
          <div id="sidebar-merchant-name"></div>
        </div>
      </div>
      <div class="sidebar-rule" style="margin:0"></div>

      <div class="sidebar-inner">
        <div class="sidebar-section">
          <div class="sidebar-section-header">
            <span>对话记录</span>
            <button id="new-conv-btn" title="新建对话">+</button>
          </div>
          <div id="conv-list" class="sidebar-list"></div>
        </div>
        <div class="sidebar-rule"></div>
        <div class="sidebar-section">
          <div class="sidebar-section-header">
            <span>商家知识库</span>
            <button id="kb-upload-trigger" title="上传文件">+</button>
          </div>
          <div id="merchant-kb-list" class="sidebar-list"></div>
        </div>
        <div class="sidebar-rule"></div>
        <div class="sidebar-section">
          <div class="sidebar-section-header"><span>平台知识库</span></div>
          <div id="platform-kb-list" class="sidebar-list"></div>
        </div>
      </div>

      <!-- Bottom: settings & logout -->
      <div class="sidebar-rule" style="margin:0"></div>
      <div id="sidebar-footer">
        <button id="sidebar-settings-btn" title="账号设置">⚙ 设置</button>
        <button id="sidebar-logout-btn" title="退出登录">退出</button>
      </div>
    </div>
    <div id="sidebar-divider">
      <div id="sidebar-toggle" title="收起/展开侧边栏">‹</div>
    </div>

    <!-- Chat pane -->
    <div id="chat-pane">

      <!-- Welcome -->
      <div id="welcome">
        <div id="welcome-heading">
          <h2>今天有什么可以帮你？</h2>
          <p>直接提问，或从下方选择一个方向开始。</p>
        </div>
        <div id="quick-cards">
          <div class="quick-card" data-prompt="请帮我分析一下我的销售数据，包括收入趋势、高峰时段和热销商品。">
            <div class="card-icon">📊</div>
            <div class="card-title">销售分析</div>
            <div class="card-desc">收入趋势、高峰时段、热销商品</div>
          </div>
          <div class="quick-card" data-prompt="请帮我调查周边竞争对手，分析我应该如何差异化。">
            <div class="card-icon">🔍</div>
            <div class="card-title">竞品分析</div>
            <div class="card-desc">分析周边竞争门店</div>
          </div>
          <div class="quick-card" data-prompt="帮我优化菜单，哪些商品该加、该减或调整定价？">
            <div class="card-icon">💡</div>
            <div class="card-title">菜单优化</div>
            <div class="card-desc">定价、商品结构、上新建议</div>
          </div>
          <div class="quick-card" data-prompt="给我5个这个月吸引更多顾客的创意营销方案。">
            <div class="card-icon">📣</div>
            <div class="card-title">营销方案</div>
            <div class="card-desc">活动策划与推广</div>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages" class="hidden"></div>

      <!-- Input -->
      <div id="input-area">
        <div id="file-list"></div>
        <div id="input-row">
          <button class="icon-btn" id="upload-btn" title="上传文件">
            <span class="material-icons" style="font-size:19px">attach_file</span>
          </button>
          <input type="file" id="file-input" multiple accept=".pdf,.xlsx,.xls,.csv,.png,.jpg,.jpeg,.webp" style="display:none" />
          <textarea id="msg-input" rows="1" placeholder="问问关于你的生意…"></textarea>
          <button id="send-btn" title="发送">
            <span class="material-icons send-icon" style="font-size:19px">send</span>
            <span class="material-icons stop-icon" style="font-size:19px;display:none">stop</span>
          </button>
        </div>
      </div>

    </div>

    <!-- Divider -->
    <div id="divider">
      <div id="canvas-toggle" title="收起/展开画布">›</div>
    </div>

    <!-- Canvas pane -->
    <div id="canvas-pane">

      <button id="canvas-clear-btn" style="display:none">清空</button>
      <!-- Module body -->
      <div id="canvas-body">
        <div id="canvas-empty-state">
          <span class="empty-icon material-icons">dashboard</span>
          <span>对话中自动生成的内容将显示在这里</span>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- KB detail modal -->
<div id="kb-modal-overlay" class="hidden">
  <div id="kb-modal">
    <div id="kb-modal-header">
      <div id="kb-modal-title"></div>
      <button id="kb-modal-close">×</button>
    </div>
    <div id="kb-modal-body"></div>
  </div>
</div>

<!-- Merchant KB folder modal -->
<div id="mkb-modal-overlay" class="hidden">
  <div id="mkb-modal">
    <div id="mkb-modal-header">
      <div id="mkb-modal-title">商家知识库</div>
      <button id="mkb-modal-close">×</button>
    </div>
    <!-- Upload zone -->
    <div id="mkb-upload-zone">
      <input type="file" id="mkb-file-input" multiple accept=".pdf,.xlsx,.xls,.csv,.txt,.md,.png,.jpg,.jpeg,.webp" style="display:none" />
      <input type="file" id="mkb-folder-input" multiple accept=".pdf,.xlsx,.xls,.csv,.txt,.md" style="display:none" webkitdirectory />
      <div class="uz-icon">📁</div>
      <div class="uz-text">拖拽文件或文件夹到此处，或点击上传</div>
      <div class="uz-btn">
        <button onclick="event.stopPropagation();document.getElementById('mkb-file-input').click()" style="padding:5px 14px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;color:var(--text);">选择文件</button>
        <button onclick="event.stopPropagation();document.getElementById('mkb-folder-input').click()" style="padding:5px 14px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;color:var(--text);">选择文件夹</button>
      </div>
    </div>
    <div id="mkb-upload-status" style="min-height:18px;font-size:12px;color:var(--text-muted);padding:4px 20px 0;flex-shrink:0;"></div>
    <!-- Toolbar: breadcrumb + stats + new folder + view toggle -->
    <div id="mkb-toolbar">
      <div id="mkb-breadcrumb"></div>
      <span id="mkb-stats"></span>
      <button onclick="mkbNewFolder()" style="padding:4px 10px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;color:var(--text-muted);white-space:nowrap;">+ 新建目录</button>
      <button onclick="loadMerchantKB().then(()=>_mkbRender())" style="padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;color:var(--text-muted);" title="刷新">↻</button>
      <div style="display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <button id="mkb-view-list-btn" onclick="mkbSetView('list')" style="border:none;border-radius:0;padding:4px 9px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text-muted);" title="列表">☰</button>
        <button id="mkb-view-grid-btn" onclick="mkbSetView('grid')" style="border:none;border-radius:0;padding:4px 9px;font-size:13px;cursor:pointer;background:var(--accent);color:#fff;" title="宫格">⊞</button>
      </div>
    </div>
    <div id="mkb-file-view"></div>
  </div>
</div>

<!-- Merchant KB folder picker (shown during upload) -->
<div id="mkb-folder-modal">
  <div id="mkb-folder-modal-inner">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;">选择上传目录</div>
    <div id="mkb-folder-list" style="max-height:200px;overflow-y:auto;margin-bottom:10px;border:1px solid var(--border);border-radius:8px;padding:4px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input id="mkb-new-folder-input" placeholder="新建目录名" style="flex:1;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;outline:none;" />
      <button onclick="mkbNewFolderInPicker()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px;white-space:nowrap;">+ 新建</button>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button onclick="mkbFolderPickerClose()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;">取消</button>
      <button onclick="mkbFolderPickerConfirm()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600;">上传到此目录</button>
    </div>
  </div>
</div>

<script>

  async function handleAuthFlow() {
    try {
      const res = await fetch(`${API}/auth/me`, { credentials: 'include' });
      if (res.ok) {
        currentUser = await res.json();
        // Redirect to onboarding if no merchant bound yet (unless user explicitly skipped)
        if (!currentUser.merchant && !new URLSearchParams(location.search).get('skip_onboarding')) {
          window.location.replace('/onboarding.html');
          return;
        }
        _onUserReady();
      } else {
        window.location.replace('/login.html');
      }
    } catch {
      window.location.replace('/login.html');
    }
  }

  function _onUserReady() {
    const initials = (currentUser.display_name || currentUser.email || '?').slice(0, 1).toUpperCase();

    // Topbar avatar
    const avatar = document.getElementById('user-avatar');
    if (avatar) avatar.textContent = initials;

    // Topbar dropdown
    const emailEl = document.getElementById('dropdown-email');
    if (emailEl) emailEl.textContent = currentUser.email;
    if (currentUser.role === 'admin') {
      const adminLink = document.getElementById('admin-link');
      if (adminLink) adminLink.style.display = '';

    // Sidebar user card
    const sidebarAvatar = document.getElementById('sidebar-avatar');
    if (sidebarAvatar) sidebarAvatar.textContent = initials;
    const sidebarName = document.getElementById('sidebar-user-name');
    if (sidebarName) sidebarName.textContent = currentUser.display_name || currentUser.email;
    const sidebarMerchant = document.getElementById('sidebar-merchant-name');
    if (sidebarMerchant) {
      sidebarMerchant.textContent = currentUser.merchant

    }

    loadSidebar();

  function renderConvList(items) {
    const container = document.getElementById('conv-list');
    if (!container) return;
    container.innerHTML = '';

      container.innerHTML = '<div style="padding:6px 8px;font-size:12px;color:var(--text-muted)">暂无对话记录</div>';
      return;
    }
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'conv-item' + (item.id === currentConvId ? ' active' : '');
      el.dataset.convId = item.id;
      const date = new Date(item.updated_at).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
      el.innerHTML = `<div class="conv-item-title">${escapeHtml(item.title || '新对话')}</div>
                      <div class="conv-item-date">${date}</div>

      container.appendChild(el);
    });

  // 只绑定一次，初始化时挂载到 conv-list
  function initConvListEvents() {
    const container = document.getElementById('conv-list');
    if (!container) return;
    container.addEventListener('click', async e => {
      const delBtn = e.target.closest('[data-del-id]');
      if (delBtn) {
        e.stopPropagation();
        if (!confirm('确定删除这条对话记录？')) return;
        const id = +delBtn.dataset.delId;
        const res = await fetch(`${API}/conversations/${id}`, { method: 'DELETE', credentials: 'include' });
        if (!res.ok) { console.error('删除失败', res.status); return; }
        if (currentConvId === id) {
          currentConvId = null;
          chatHistory = [];
          historySummary = '';
          messagesEl.innerHTML = '';
          conversationStarted = false;
          welcomeEl.classList.remove('hidden');
          messagesEl.classList.add('hidden');
          Canvas.clear();
        }
        loadConversations();
        return;
      }
      const convEl = e.target.closest('.conv-item[data-conv-id]');
      if (convEl) restoreConversation(+convEl.dataset.convId);
    });
  }

  async function restoreConversation(convId) {
    // Abort any in-flight stream before switching — prevents the old stream from
    // writing into the new conversation's UI after navigation.
    if (isStreaming && _abortController) _abortController.abort();
    _preCreatePromise = null;
    try {
      const res = await fetch(`${API}/conversations/${convId}`, { credentials: 'include' });
      if (!res.ok) return;
      const data = await res.json();

      // Clear current UI
      messagesEl.innerHTML = '';
      chatHistory = [];
      historySummary = '';
      conversationStarted = true;
      welcomeEl.classList.add('hidden');
      messagesEl.classList.remove('hidden');

      // Re-render messages and replay canvas events
      Canvas.clear();
      data.messages.forEach(m => {
        if (m.role === 'user') appendUserMsg(m.content);
        else if (m.role === 'assistant') {
          const b = appendAssistantMsg(_injectChartRefs(marked.parse(m.content)));
          if (b) _bindChartRefs(b);
          if (m.canvas_json) {
            try {
              JSON.parse(m.canvas_json).forEach(evt => handleCanvasUpdate(evt));
            } catch {}
          }
        }
        chatHistory.push({ role: m.role, content: m.content });
      });

      currentConvId = convId;
      // Highlight active item
      document.querySelectorAll('.conv-item').forEach(el => {
        el.classList.toggle('active', +el.dataset.convId === convId);
      });
      scrollBottom();
    } catch {}
  }

  // ── Brand Canvas Renderer (shared with onboarding.html) ──────────────────
  function _bcEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function _bcSafeHtml(s) { return _bcEsc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/&lt;strong&gt;(.+?)&lt;\/strong&gt;/g,'<strong>$1</strong>'); }
  function _bcSrc(type) {
    const map = { places:'<span class="bc-src bc-sp">Places</span>', chains:'<span class="bc-src bc-sc">chains</span>', calc:'<span class="bc-src bc-sk">计算值</span>', ai:'<span class="bc-src bc-sl">AI推断</span>' };
    return map[type] || '';
  }
  function _bcRatingClass(r) { return r >= 4.5 ? 'bc-r-hi' : r >= 4.0 ? 'bc-r-md' : 'bc-r-lo'; }

  function renderBrandCanvasInto(profile, container) {
    const p = profile.profile_json;
    const m = profile.meta || {};
    const ckb = profile.chain_kb || {};
    const brandName = profile.brand_name || '商家';
    const ss = p.scan_summary || {};
    const mkt = p.market || {};
    const pos = p.positioning || {};
    const social = p.social || [];
    const comps = p.competitors || {};
    const ability = p.ability || {};
    const diag = p.diagnosis || {};

    const sampleSize = m.sample_size || 1;
    const isCn = ckb.origin === 'CN' || ckb.region === 'cn';
    const catLower = (ckb.category||'').toLowerCase();
    const icoEmoji = catLower.includes('咖啡')||catLower.includes('coffee') ? '☕'
      : catLower.includes('茶')||catLower.includes('tea') ? '🍵'
      : catLower.includes('鸡')||catLower.includes('chicken') ? '🍗' : '🏪';
    const _tabPrefix = 'bcm-' + Date.now();

    // stat-row values
    const ratingVal = isCn ? (ckb.avg_rating_amap || m.rating) : m.rating;
    const stat1Val = ratingVal ? parseFloat(ratingVal).toFixed(1) : '—';
    const stat1Lbl = isCn ? '大众点评均分' : 'Google评分';

    let stat2Val, stat2Lbl;
    if (isCn) {
      stat2Val = ckb.avg_price_amap ? '¥' + ckb.avg_price_amap : (ckb.priceBand || '—');
      stat2Lbl = '客单价区间';
    } else {
      stat2Val = ckb.priceBand ? ckb.priceBand.replace('Rp ','').replace('Rp','') : '—';
      stat2Lbl = '价格带';
    }

    const stat3Val = isCn ? (ckb.storeCount || m.store_count || '—') : (m.review_count ? m.review_count.toLocaleString() : '—');
    const stat3Lbl = isCn ? '全国门店数' : '总评论（样本）';

    let html = '';

    // 头部
    html += `<div class="bc-brand-head">
      <div class="bc-brand-ico">${icoEmoji}</div>
      <div>
        <div class="bc-brand-name">${_bcEsc(brandName)}</div>
        <div class="bc-brand-sub">${_bcEsc(ckb.category||'')}${ckb.origin ? ' · ' + _bcEsc(ckb.origin==='CN'?'中国':'Indonesia') : ''}${ckb.founded ? ' · ' + ckb.founded : ''}</div>
      </div>
      <div class="bc-scan-badge">品牌扫描</div>
    </div>`;

    // Stats 行
    html += `<div class="bc-stats">
      <div class="bc-stat"><div class="bc-stat-val">${stat1Val}</div><div class="bc-stat-lbl">${stat1Lbl}</div></div>
      <div class="bc-stat"><div class="bc-stat-val">${stat2Val}</div><div class="bc-stat-lbl">${stat2Lbl}</div></div>
      <div class="bc-stat"><div class="bc-stat-val">${_bcEsc(String(stat3Val))}</div><div class="bc-stat-lbl">${stat3Lbl}</div></div>
    </div>`;

    // 扫描摘要
    if (ss.mirror || ss.window || ss.door || ss.action) {
      html += `<div class="bc-card"><div class="bc-card-title">平台扫描摘要</div>`;
      if (ss.mirror) html += `<div class="bc-scan-item"><div class="bc-scan-lbl">🪞 现状</div><div class="bc-scan-txt">${_bcSafeHtml(ss.mirror)}</div></div>`;
      if (ss.window) html += `<div class="bc-scan-item"><div class="bc-scan-lbl">🔍 洞察</div><div class="bc-scan-txt">${_bcSafeHtml(ss.window)}</div></div>`;
      if (ss.door)   html += `<div class="bc-scan-item"><div class="bc-scan-lbl">🚪 行动</div><div class="bc-scan-txt">${_bcSafeHtml(ss.door)}</div></div>`;
      if (ss.action) html += `<div class="bc-scan-item"><div class="bc-scan-lbl">⚡ 平台重点</div><div class="bc-scan-txt">${_bcSafeHtml(ss.action)}</div></div>`;
      html += `</div>`;
    }

    // 市场格局
    const hasMktBar = mkt.market_bar_data && mkt.market_bar_data.length;
    if (mkt.market_size || mkt.yoy_growth || hasMktBar) {
      html += `<div class="bc-card"><div class="bc-card-title">市场格局</div>
        <div class="bc-mkt-cells">
          <div class="bc-mkt-cell"><div class="bc-mkt-val">${_bcEsc(mkt.market_size||'—')}</div><div class="bc-mkt-lbl">${_bcEsc(ckb.category||'')}市场规模</div></div>
          <div class="bc-mkt-cell"><div class="bc-mkt-val green">${_bcEsc(mkt.yoy_growth||'—')}</div><div class="bc-mkt-lbl">年复合增速</div></div>
        </div>`;
      if (hasMktBar) {
        html += `<div id="${_tabPrefix}-mkt-bars"></div>`;
      }
      if (mkt.core_market) html += `<div class="bc-core-mkt">📍 ${_bcEsc(mkt.core_market)}</div>`;
      html += `</div>`;
    }

    // 价格定位轴
    if (pos.axis_items && pos.axis_items.length) {
      html += `<div class="bc-card"><div class="bc-card-title">价格定位轴</div>
        <div id="${_tabPrefix}-axis" class="bc-axis-wrap" style="height:100px;"></div>
        <div class="bc-axis-ends"><span>低价</span><span>高价</span></div>
      </div>`;
    }

    // 竞品图谱
    const allCompItems = [...(comps.head||[]), ...(comps.direct||[]), ...(comps.growth||[])];
    if (allCompItems.length) {
      html += `<div class="bc-card"><div class="bc-card-title">竞品图谱</div>`;
      function _renderTier(tier, label, dotCls) {
        const items = comps[tier] || [];
        if (!items.length) return '';
        let t = `<div style="margin-bottom:16px;"><div class="bc-tier-label"><span class="bc-tier-dot ${dotCls}"></span>${label}</div>`;
        for (const c of items) {
          const isSelf = !!c.is_self, isWarn = !isSelf && !!c.is_warn;
          const cardCls = 'bc-comp-card'+(isSelf?' self-card':isWarn?' warn-card':'');
          const priceLbl = isCn ? (c.price_band||'—') : (c.price_band ? c.price_band.replace('Rp ','').replace('Rp','') : '—');
          t += `<div class="${cardCls}">
            <div class="bc-comp-row">
              <div>
                <div class="bc-comp-name${isSelf?' self':''}">${_bcEsc(c.name)}${isWarn?` <span class="bc-warn-badge">⚡ 威胁</span>`:''}</div>
                <div class="bc-comp-meta">${_bcEsc(c.category||'')}${c.founded?' · 创立 '+c.founded:''}</div>
              </div>
              <div class="bc-comp-right">
                <div class="bc-comp-stores" style="${isSelf?'color:#4a9eff':''}">${c.store_count!=null?c.store_count.toLocaleString():'—'}</div>
                <div class="bc-comp-price">${priceLbl}</div>
              </div>
            </div>`;
          if (c.insight) t += `<div class="bc-comp-insight">${_bcEsc(c.insight)}</div>`;
          t += `</div>`;
        }
        t += `</div>`; return t;
      }
      html += _renderTier('head','头部参照','bc-td-head');
      html += _renderTier('direct','直接竞争','bc-td-direct');
      html += _renderTier('growth','成长型威胁','bc-td-growth');
      html += `</div>`;
    }

    // 社媒声量
    if (social.length) {
      const _platIco = { '微信':'💬','微信公众号':'💬','抖音':'🎵','微博':'🔵','小红书':'📕','Instagram':'📸','TikTok':'🎵','Facebook':'👤','美团':'🛵','饿了么':'🛵','YouTube':'▶️' };
      const _platBg  = { '微信':'rgba(7,193,96,0.15)','微信公众号':'rgba(7,193,96,0.15)','抖音':'rgba(255,0,80,0.15)','微博':'rgba(30,120,255,0.15)','小红书':'rgba(255,60,60,0.15)','美团':'rgba(255,144,0,0.15)','饿了么':'rgba(0,164,255,0.15)','Instagram':'rgba(200,50,150,0.15)','TikTok':'rgba(0,0,0,0.3)','Facebook':'rgba(24,119,242,0.15)' };
      html += `<div class="bc-card"><div class="bc-card-title">社媒声量</div>`;
      for (const s of social) {
        html += `<div class="bc-social-row">
          <div class="bc-social-ico" style="background:${_platBg[s.platform]||'rgba(74,158,255,0.15)'}">${_platIco[s.platform]||'📱'}</div>
          <div>
            <div class="bc-soc-plat">${_bcEsc(s.platform)}</div>
            <div class="bc-soc-val">${_bcEsc(s.followers||'—')}</div>
            <div class="bc-soc-note">${_bcEsc(s.note||'')}${s.handle?' @'+_bcEsc(s.handle):''}</div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }

    // 经营能力评估
    const _abilKeys = [['basic','🏗 基础运营'],['growth','📈 增长引擎'],['scale','🚀 规模效率']];
    if (_abilKeys.some(([k])=>(ability[k]||[]).length)) {
      html += `<div class="bc-card"><div class="bc-card-title">经营能力评估</div>`;
      for (const [key, secTitle] of _abilKeys) {
        const rows = ability[key] || [];
        if (!rows.length) continue;
        html += `<div class="bc-ability-sec"><div class="bc-ability-sec-title">${secTitle}</div>`;
        for (const row of rows) {
          const lvl = row.level==='strong'?'strong':row.level==='mid'?'mid':'weak';
          const lvlTxt = lvl==='strong'?'强':lvl==='mid'?'中':'弱';
          html += `<div class="bc-ability-item"><span class="bc-ability-badge bc-ab-${lvl}">${lvlTxt}</span><span class="bc-ability-text">${_bcEsc(row.title)}${row.module?`<br><span style="font-size:11px;color:#666;">→ 平台模块：${_bcEsc(row.module)}</span>`:''}</span></div>`;
        }
        html += `</div>`;
      }

    // 核心诊断
    if (diag.because || diag.therefore || diag.action) {
      html += `<div class="bc-card"><div class="bc-card-title">核心诊断</div>`;
      if (diag.because)   html += `<div class="bc-diag-item"><div class="bc-diag-lbl because">🔴 现状</div><div class="bc-diag-txt">${_bcEsc(diag.because)}</div></div>`;
      if (diag.therefore) html += `<div class="bc-diag-item"><div class="bc-diag-lbl therefore">🟡 本质</div><div class="bc-diag-txt">${_bcEsc(diag.therefore)}</div></div>`;
      if (diag.action)    html += `<div class="bc-diag-item"><div class="bc-diag-lbl action">🔵 行动</div><div class="bc-diag-txt">${_bcEsc(diag.action)}</div></div>`;
      html += `<button class="bc-cta-btn" onclick="document.getElementById('kb-modal-overlay').classList.add('hidden')">开始分析单店数据 →</button>`;
      html += `</div>`;
    }

    html += `<div class="bc-footer">由 Shopilot AI 生成 · 数据来源：${isCn?'高德地图采样':'Google Places API · '+sampleSize+'家样本'} + 公开信息 · 仅供参考</div>`;

    container.innerHTML = html;

    // Post-render: market bars
    if (hasMktBar) {
      const wrap = container.querySelector(`#${_tabPrefix}-mkt-bars`);
      if (wrap) {
        const bars = mkt.market_bar_data;
        const maxV = Math.max(...bars.map(d => d.store_count||d.pct||1));
        wrap.innerHTML = bars.map(d => {
          const cnt = d.store_count || 0;
          const pct = Math.round(cnt / maxV * 100);
          const cntStr = cnt >= 1000 ? (cnt/1000).toFixed(cnt%1000===0?0:1)+'k' : (cnt||'');
          return `<div class="bc-bar-row">`
            + `<div class="bc-bar-name${d.is_self?' self':''}">${_bcEsc(d.name)}${d.is_self?' ▶':''}</div>`
            + `<div class="bc-bar-track"><div class="bc-bar-fill${d.is_self?' self':''}" style="width:${pct}%"></div></div>`
            + `<div class="bc-bar-count">${cntStr}</div>`
            + `</div>`;
        }).join('');
      }
    }

    // Post-render: price axis
    if (pos.axis_items && pos.axis_items.length) {
      const axisEl = container.querySelector(`#${_tabPrefix}-axis`);
      if (axisEl) _bcRenderPriceAxis(axisEl, pos.axis_items, isCn);
    }
  }

  function _bcRenderPriceAxis(axisEl, items, isCn) {
    const PADDING = 0.08;
    const allP = items.flatMap(b => [b.price_low||0, b.price_high||0]);
    const minP = Math.min(...allP), maxP = Math.max(...allP);
    const range = maxP - minP || 1;
    const toLeft = p => PADDING*100 + ((p-minP)/range)*(1-2*PADDING)*100;
    const sorted = [...items].sort((a,b) => (a.price_low+a.price_high)-(b.price_low+b.price_high));
    const mids = sorted.map(b => toLeft(((b.price_low||0)+(b.price_high||0))/2));
    const offsets = new Array(sorted.length).fill(0);
    for (let i=1; i<mids.length; i++) if (mids[i]-mids[i-1] < 9) offsets[i] = offsets[i-1]+14;
    axisEl.style.height = (88 + Math.max(...offsets)) + 'px';
    const line = document.createElement('div'); line.className = 'bc-axis-line'; axisEl.appendChild(line);
    sorted.forEach((b, i) => {
      const mid = ((b.price_low||0)+(b.price_high||0))/2;
      const lp = toLeft(b.price_low||0), hp = toLeft(b.price_high||0);
      const rangeEl = document.createElement('div');
      rangeEl.className = 'bc-axis-range' + (b.is_self?' self':'');
      rangeEl.style.cssText = 'left:'+lp+'%;width:'+(hp-lp)+'%';
      axisEl.appendChild(rangeEl);
      const node = document.createElement('div');
      node.className = 'bc-axis-node'; node.style.left = toLeft(mid)+'%';
      const dot = document.createElement('div'); dot.className = 'bc-axis-dot'+(b.is_self?' self':'');
      const lbl = document.createElement('div'); lbl.className = 'bc-axis-lbl'+(b.is_self?' self':'');
      lbl.style.top = 'calc(100% + '+(6+offsets[i])+'px)';
      lbl.textContent = b.name.length > 6 ? b.name.slice(0,6)+'…' : b.name;
      lbl.title = b.name + ' ' + (isCn ? `¥${b.price_low||0}–${b.price_high||0}` : `${Math.round((b.price_low||0)/1000)}–${Math.round((b.price_high||0)/1000)}k`);
      const ph = document.createElement('div');
      ph.style.cssText = 'font-size:8px;color:var(--text-muted);position:absolute;top:calc(100% + '+(20+offsets[i])+'px);left:50%;transform:translateX(-50%);white-space:nowrap';
      ph.textContent = isCn ? `¥${b.price_low||0}–${b.price_high||0}` : `${Math.round((b.price_low||0)/1000)}–${Math.round((b.price_high||0)/1000)}k`;
      node.appendChild(dot); node.appendChild(lbl); node.appendChild(ph);
      axisEl.appendChild(node);
    });
  }

  // ── Merchant KB folder tree ───────────────────────────────────────────────

  let _mkbPath = [];
  let _mkbExpanded = {};
  let _mkbView = 'grid';   // 'list' | 'grid'
  let _mkbPendingFiles = null;
  let _mkbSelectedFolder = '';

  function _mkbEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function _mkbDocs() { return _merchantKBItems.filter(i => i.source_type === 'upload'); }

  function _mkbBuildTree(docs, pathPrefix) {
    const folders = {}, files = [];
    for (const doc of docs) {
      const rel = pathPrefix ? doc.original_name.slice(pathPrefix.length + 1) : doc.original_name;
      const slash = rel.indexOf('/');
      if (slash === -1) { if (rel !== '.keep') files.push(doc); }
      else { const f = rel.slice(0, slash); if (!folders[f]) folders[f] = []; folders[f].push(doc); }
    }
    return { folders, files };
  }

  function _mkbDocsUnder(prefix) {
    return _mkbDocs().filter(d =>
      prefix === '' ? true : d.original_name.startsWith(prefix + '/') || d.original_name === prefix
    );
  }

  function _mkbSdot(status) {
    const c = status==='indexed'?'#22c55e':status==='processing'?'#f59e0b':'#ef4444';
    return `<span class="mkb-sdot" style="background:${c}" title="${status}"></span>`;
  }

  function _mkbRenderStats() {
    const docs = _mkbDocs().filter(d => !d.original_name.endsWith('/.keep'));
    const chunks = docs.reduce((a,d)=>a+(d.chunk_count||0),0);
    const proc = docs.filter(d=>d.status==='processing').length;
    document.getElementById('mkb-stats').textContent =
      `${docs.length} 个文件 · ${chunks} chunks${proc?' · '+proc+' 个索引中':''}`;
  }

  function _mkbRenderBreadcrumb() {
    const el = document.getElementById('mkb-breadcrumb');
    const parts = [{label:'全部文件',path:[]}, ..._mkbPath.map((s,i)=>({label:s,path:_mkbPath.slice(0,i+1)}))];
    el.innerHTML = parts.map((p,i) => {
      const last = i===parts.length-1;
      return last
        ? `<span style="color:var(--text);font-weight:600;">${_mkbEsc(p.label)}</span>`
        : `<span class="mkb-bc-item" onclick="mkbNavTo(${JSON.stringify(p.path)})">${_mkbEsc(p.label)}</span><span class="mkb-bc-sep"> / </span>`;
    }).join('');
  }

  // ── List view ──────────────────────────────────────

  function _mkbListInner(folders, files, prefix) {
    let html = '';
    for (const [fname, fdocs] of Object.entries(folders).sort()) {
      const fullPath = prefix ? `${prefix}/${fname}` : fname;
      const isOpen = _mkbExpanded[fullPath];
      const count = fdocs.filter(d=>!d.original_name.endsWith('/.keep')).length;
      html += `
        <div class="mkb-row" onclick="mkbToggleFolder('${_mkbEsc(fullPath)}')">
          <span class="mkb-chevron ${isOpen?'open':''}">▶</span>
          <span class="mkb-icon">📁</span>
          <span class="mkb-name">${_mkbEsc(fname)}</span>
          <span class="mkb-meta">${count} 个文件</span>
          <div class="mkb-actions" onclick="event.stopPropagation()">
            <button onclick="mkbRenameFolder('${_mkbEsc(fullPath)}','${_mkbEsc(fname)}');event.stopPropagation()">改名</button>
            <button class="danger" onclick="mkbDeleteFolder('${_mkbEsc(fullPath)}','${_mkbEsc(fname)}');event.stopPropagation()">删除</button>
          </div>
        </div>`;
      if (isOpen) {
        const sub = _mkbBuildTree(fdocs, fullPath);
        html += `<div class="mkb-indent">${_mkbListInner(sub.folders, sub.files, fullPath)}</div>`;
      }
    }
    for (const doc of files.sort((a,b)=>a.original_name.localeCompare(b.original_name))) {
      const fname = doc.original_name.split('/').pop();
      html += `
        <div class="mkb-row">
          <span style="width:12px;flex-shrink:0;"></span>
          <span class="mkb-icon">📄</span>
          <span class="mkb-name">${_mkbEsc(fname)}</span>
          ${_mkbSdot(doc.status)}
          <span class="mkb-meta">${doc.chunk_count||0} chunks</span>
          <div class="mkb-actions">
            <button onclick="mkbRenameFile(${doc.id},'${_mkbEsc(fname)}')">改名</button>
            <button class="danger" onclick="mkbDeleteFile(${doc.id},'${_mkbEsc(fname)}')">删除</button>
          </div>
        </div>`;
    }
    return html;
  }

  // ── Grid view ──────────────────────────────────────

  function _mkbGrid(container, folders, files, prefix) {
    let html = '<div class="mkb-grid">';
    for (const [fname, fdocs] of Object.entries(folders).sort()) {
      const fullPath = prefix ? `${prefix}/${fname}` : fname;
      const newPath = JSON.stringify([..._mkbPath, fname]).replace(/'/g,"&#39;");
      const count = fdocs.filter(d=>!d.original_name.endsWith('/.keep')).length;
      html += `
        <div class="mkb-card mkb-folder-card" data-path='${newPath}'>
          <div class="mkb-card-actions" onclick="event.stopPropagation()">
            <button onclick="mkbRenameFolder('${_mkbEsc(fullPath)}','${_mkbEsc(fname)}');event.stopPropagation()">✏</button>
            <button onclick="mkbDeleteFolder('${_mkbEsc(fullPath)}','${_mkbEsc(fname)}');event.stopPropagation()">✕</button>
          </div>
          <div class="mkb-card-icon">📁</div>
          <div class="mkb-card-name" title="${_mkbEsc(fname)}">${_mkbEsc(fname)}</div>
          <div style="font-size:10px;color:var(--text-muted)">${count} 个文件</div>
        </div>`;
    }
    for (const doc of files.sort((a,b)=>a.original_name.localeCompare(b.original_name))) {
      const fname = doc.original_name.split('/').pop();
      const ext = fname.split('.').pop().toLowerCase();
      const icon = ext==='pdf'?'📕':ext==='md'?'📝':(ext==='xlsx'||ext==='xls'||ext==='csv')?'📊':'📄';
      html += `
        <div class="mkb-card">
          <div class="mkb-card-actions" onclick="event.stopPropagation()">
            <button onclick="mkbRenameFile(${doc.id},'${_mkbEsc(fname)}')">✏</button>
            <button onclick="mkbDeleteFile(${doc.id},'${_mkbEsc(fname)}')">✕</button>
          </div>
          <div class="mkb-card-icon">${icon}</div>
          <div class="mkb-card-name" title="${_mkbEsc(fname)}">${_mkbEsc(fname)}</div>
          <div style="font-size:10px;color:var(--text-muted)">${doc.chunk_count||0} chunks ${_mkbSdot(doc.status)}</div>
        </div>`;
    }
    html += '</div>';
    container.innerHTML = html;
    container.querySelectorAll('.mkb-folder-card').forEach(el => {
      el.addEventListener('click', () => { _mkbPath = JSON.parse(el.dataset.path); _mkbRender(); });
    });
  }

  function _mkbRender() {
    const container = document.getElementById('mkb-file-view');
    if (!container) return;
    const prefix = _mkbPath.join('/');
    const scoped = _mkbDocsUnder(prefix);
    const { folders, files } = _mkbBuildTree(scoped, prefix);
    _mkbRenderBreadcrumb();
    _mkbRenderStats();
    if (!Object.keys(folders).length && !files.length) {
      container.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:13px;">暂无文件，点击上方上传</div>';
      return;
    }
    if (_mkbView === 'grid') {
      _mkbGrid(container, folders, files, prefix);
    } else {
      container.innerHTML = `<div style="padding:4px 8px;">${_mkbListInner(folders, files, prefix)}</div>`;
    }
  }

  // convIdAtStart: snapshot taken when sendMessage began — prevents cross-conversation pollution
  // if user switched away mid-stream, we still save to the original conversation but don't hijack the UI
  async function persistTurn(userMsg, assistantMsg, canvasEvts = [], convIdAtStart) {
    if (!currentUser) return;
    let savedConvId = convIdAtStart;
    try {
      if (!savedConvId) {
        const res = await fetch(`${API}/conversations`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ merchant_id: currentUser.merchant?.id || null }),
        });
        if (!res.ok) return;
        const data = await res.json();
        savedConvId = data.id;
        // Only update global currentConvId if the user hasn't switched away
        if (currentConvId === convIdAtStart) {
          currentConvId = savedConvId;
        }
      }
      await fetch(`${API}/conversations/${savedConvId}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ messages: [
          { role: 'user', content: userMsg },
          { role: 'assistant', content: assistantMsg, canvas_json: canvasEvts.length ? JSON.stringify(canvasEvts) : null },
        ]}),
      });
      loadConversations();
    } catch {}
  }

  // ── Canvas module registry ────────────────────────
  // Each module: { label, icon, replace, render(data, container) }
  const _moduleRegistry = {};
  const _moduleInstances = {}; // type → DOM element (for replace=true modules)
  const _echartsInstances = []; // 所有 ECharts 实例，用于 dispose/resize

  const Canvas = {
    register(type, def) {
      _moduleRegistry[type] = def;
    },

    dispatch(update) {
      const { type, ...data } = update;
      const def = _moduleRegistry[type];
      if (!def) { console.warn('Canvas: unknown module type', type); return; }
      console.log('[Canvas.dispatch]', type, JSON.stringify(data).slice(0, 100));

      // Remove empty state
      const empty = document.getElementById('canvas-empty-state');
      if (empty) empty.remove();

      clearBtn.style.display = '';

      if (def.replace && _moduleInstances[type]) {
        // Re-render into existing wrapper
        const wrapper = _moduleInstances[type];
        const body = wrapper.querySelector('.module-body');
        body.innerHTML = '';
        try { def.render(data, body); } catch(e) { console.error('[Canvas.render error]', type, e); }
      } else {
        // Create new module wrapper
        const wrapper = document.createElement('div');
        wrapper.className = 'canvas-module';
        wrapper.dataset.moduleType = type;

        if (def.label) {
          const label = document.createElement('div');
          label.className = 'module-label';
          label.textContent = (def.icon ? def.icon + ' ' : '') + def.label;
          wrapper.appendChild(label);
        }

        const body = document.createElement('div');
        body.className = 'module-body';
        body.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
        wrapper.appendChild(body);
        try { def.render(data, body); } catch(e) { console.error('[Canvas.render error]', type, e); }

        if (def.replace) {
          _moduleInstances[type] = wrapper;
        }

        // analysis_card always goes to the top; everything else appends to bottom
        if (type === 'analysis_card') {
          canvasBody.insertBefore(wrapper, canvasBody.firstChild);
        } else {
          canvasBody.appendChild(wrapper);
        }
      }

      // Expand canvas if collapsed
      if (canvasCollapsed) toggleCanvas();

      // Scroll to bottom of canvas
      canvasBody.scrollTop = canvasBody.scrollHeight;
    },

    clear() {
      _echartsInstances.forEach(c => { try { c.dispose(); } catch(_) {} });
      _echartsInstances.length = 0;
      canvasBody.innerHTML = '';
      Object.keys(_moduleInstances).forEach(k => delete _moduleInstances[k]);
      const empty = document.createElement('div');
      empty.id = 'canvas-empty-state';
      empty.innerHTML = `<span class="empty-icon material-icons">dashboard</span><span>对话中自动生成的内容将显示在这里</span>`;
      canvasBody.appendChild(empty);
      clearBtn.style.display = 'none';
    },
  };

  function _initChart(el, option) {
    const inst = echarts.init(el, null, { renderer: 'svg' });
    inst.setOption(option);
    _echartsInstances.push(inst);
    // Wait for container to have actual width before sizing
    const _tryResize = (attempts) => {
      if (el.offsetWidth > 0) {
        inst.resize();
      } else if (attempts > 0) {
        setTimeout(() => _tryResize(attempts - 1), 50);
      }
    };
    requestAnimationFrame(() => _tryResize(10));
    return inst;
  }

  // ── SSE reader ────────────────────────────────────
  async function readSSEStream(res, onChunk) {
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      // Split on SSE event boundaries (double newline)
      const events = buf.split('\n\n');
      buf = events.pop(); // keep incomplete trailing event
      for (const event of events) {
        // Each event may have multiple lines; collect all data: lines
        const dataLines = event.split('\n')
          .filter(l => l.startsWith('data: '))
          .map(l => l.slice(6));
        const data = dataLines.join('').trim();
        if (!data) continue;
        if (data === '[DONE]') return;
        try { onChunk(JSON.parse(data)); } catch(_) {}
      }
    }
  }
